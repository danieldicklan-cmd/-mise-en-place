      await markAsRead();
      render();
      showToast('✓ Rafraîchi');
      break;
    }
    case 'add-event': state.modal = { type: 'event-form', event: null }; render(); break;
    case 'edit-event': {
      const ev = state.data.events.find(x => x.id === el.dataset.id);
      state.modal = { type: 'event-form', event: ev };
      render();
      break;
    }
    case 'save-event': {
      const title = document.getElementById('evt-title').value.trim();
      if (!title) { showToast('Titre requis'); return; }
      const date = document.getElementById('evt-date').value;
      if (!date) { showToast('Date requise'); return; }
      const isNew = !el.dataset.id;
      const newEvent = {
        id: el.dataset.id || uid(),
        title,
        type: document.getElementById('evt-type').value,
        date,
        endDate: document.getElementById('evt-enddate').value || '',
        description: document.getElementById('evt-desc').value,
        affectsMeal: document.getElementById('evt-affects').checked,
        mealNote: document.getElementById('evt-meal').value,
        createdBy: state.profile ? state.profile.name : 'Anonyme',
        createdAt: Date.now(),
      };
      if (!state.data.events) state.data.events = [];
      const idx = state.data.events.findIndex(x => x.id === newEvent.id);
      if (idx >= 0) {
        // Preserve original creator/date when editing
        newEvent.createdBy = state.data.events[idx].createdBy;
        newEvent.createdAt = state.data.events[idx].createdAt;
        state.data.events[idx] = newEvent;
      } else {
        state.data.events.push(newEvent);
        // Auto-post to family chat
        const d = new Date(date);
        const dateLabel = d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
        const typeIcon = EVENT_TYPES[newEvent.type]?.icon || '📅';
        await sendMessage(`${typeIcon} Nouvel événement : **${title}** — ${dateLabel}${newEvent.affectsMeal && newEvent.mealNote ? `\n\n*${newEvent.mealNote}*` : ''}`);
      }
      await saveData();
      state.modal = { type: 'family-chat' };
      state.familySubview = 'events';
      render();
      showToast(idx >= 0 ? 'Événement modifié' : 'Événement créé');
      break;
    }
    case 'delete-event': {
      if (confirm('Supprimer cet événement ?')) {
        state.data.events = state.data.events.filter(x => x.id !== el.dataset.id);
        await saveData();
        state.modal = { type: 'family-chat' };
        state.familySubview = 'events';
        render();
        showToast('Événement supprimé');
      }
      break;
    }
  }
}

// ============================================================
// RENDER
// ============================================================
function renderPinGate() {
  const invited = !!state.fromInvite;
  return `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 22px;background:linear-gradient(135deg,var(--paper) 0%,var(--paper-2) 100%);">
      <div style="font-family:'Newsreader',serif;font-style:italic;font-size:24px;color:var(--terracotta);margin-bottom:6px;">Mise en place</div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.16em;color:var(--muted);font-weight:500;margin-bottom:30px;">Accès protégé</div>

      ${invited ? `
        <div style="background:rgba(92,112,80,0.12);border:1px solid var(--sage);color:var(--sage-dark);padding:14px 16px;border-radius:14px;margin-bottom:18px;max-width:340px;font-size:13px;line-height:1.5;text-align:center;">
          <strong>Tu as été invité·e à rejoindre la famille.</strong><br>
          Demande le code PIN à la personne qui t'a invité·e et entre-le ci-dessous.
        </div>
      ` : ''}

      <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px 22px;width:100%;max-width:320px;box-shadow:var(--shadow);">
        <div style="font-family:'Newsreader',serif;font-size:18px;text-align:center;margin-bottom:6px;">Code famille</div>
        <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:18px;">Entre le code pour déverrouiller</div>

        <input
          type="password"
          inputmode="numeric"
          pattern="[0-9]*"
          id="pin-input"
          maxlength="8"
          placeholder="••••"
          value="${escapeHtml(state.pinDraft)}"
          style="width:100%;text-align:center;font-size:28px;letter-spacing:0.4em;padding:14px;border:2px solid ${state.pinError ? 'var(--rose)' : 'var(--border-2)'};border-radius:14px;background:var(--paper-2);font-variant-numeric:tabular-nums;outline:none;"
          onkeydown="if(event.key==='Enter')handleAction('pin-unlock', this);"
          oninput="state.pinDraft=this.value;state.pinError='';"
        >

        ${state.pinError ? `<div style="color:var(--rose);font-size:12px;text-align:center;margin-top:10px;font-weight:500;">${escapeHtml(state.pinError)}</div>` : ''}

        <button class="btn btn-primary btn-full" data-action="pin-unlock" style="margin-top:14px;">Déverrouiller</button>
      </div>

      <div style="font-size:10px;color:var(--muted-2);text-align:center;margin-top:24px;line-height:1.5;max-width:280px;">
        Le code est partagé entre tous les membres de la famille.<br>
        Modifiable dans Réglages une fois connecté.
      </div>
    </div>
  `;
}

function render() {
  const root = document.getElementById('app');

  // PIN gate court-circuite tout le rendu
  if (state.locked) {
    root.innerHTML = renderPinGate();
    setTimeout(() => {
      const i = document.getElementById('pin-input');
      if (i) i.focus();
    }, 50);
    return;
  }

  const views = {
    today: renderToday,
    week: renderWeek,
    carte: renderCarte,
    courses: renderCourses,
    stock: renderStock,
  };

  const tabs = [
    { key: 'today', label: 'Jour', icon: ICONS.today },
    { key: 'week', label: 'Semaine', icon: ICONS.week },
    { key: 'carte', label: 'Carte', icon: ICONS.carte },
    { key: 'courses', label: 'Courses', icon: ICONS.shop },
    { key: 'stock', label: 'Stock', icon: ICONS.stock },
  ];

  root.innerHTML = `
    ${!firebaseReachable ? `
      <div style="background:linear-gradient(135deg,#D49645,#B87A2E);color:white;padding:9px 14px;font-size:11px;line-height:1.4;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:60;max-width:480px;margin:0 auto;">
        <span style="font-size:16px;">⚠️</span>
        <div style="flex:1;"><strong>Hors-ligne</strong> — les modifs seront syncées dès que Firebase répond.</div>
        <button data-action="retry-firebase" style="background:rgba(255,255,255,0.25);color:white;border:none;padding:4px 9px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;">Réessayer</button>
      </div>
    ` : ''}
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">Mise en place</div>
      </div>
      <div style="display:flex;gap:4px;align-items:center;">
        <button class="icon-btn" data-action="open-family" style="position:relative;">
          ${ICONS.users}
          ${(() => {
            const dmTotal = Object.values(state.unreadDms || {}).reduce((s, n) => s + n, 0);
            const total = (state.unreadCount || 0) + dmTotal;
            return total > 0 ? `<span style="position:absolute;top:4px;right:4px;background:var(--terracotta);color:white;border-radius:100px;min-width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;">${total}</span>` : '';
          })()}
        </button>
        <button class="icon-btn" data-action="settings">${ICONS.cog}</button>
      </div>
    </header>
    <main>${views[state.view]()}</main>
    <button class="fab" data-action="open-chat">${ICONS.chat}</button>
    <nav class="bottomnav">
      ${tabs.map(t => `
        <button class="navtab ${state.view === t.key ? 'active' : ''}" data-action="nav" data-tab="${t.key}">
          <div class="navtab-pill">${t.icon}</div>
          <span>${t.label}</span>
        </button>
      `).join('')}
    </nav>
    ${renderModal()}
    ${state.viewerImage ? `
      <div class="modal-backdrop" data-action="close-viewer" style="z-index:1000;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;padding:20px;">
        <img src="${state.viewerImage}" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;">
        <button class="icon-btn" data-action="close-viewer" style="position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.95);">${ICONS.x}</button>
      </div>
    ` : ''}
    ${state.toast ? `<div class="toast">${state.toast}</div>` : ''}
  `;

  // Search input listener (preserve focus)
  const searchInput = document.querySelector('[data-input="search"]');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      state.searchTerm = e.target.value;
      // Don't full-rerender to preserve focus; rerender only the list section
      // Simple approach: rerender all but restore focus
      const pos = e.target.selectionStart;
      render();
      const newInput = document.querySelector('[data-input="search"]');
      if (newInput) {
        newInput.focus();
        newInput.setSelectionRange(pos, pos);
      }
    });
  }

  // Couverts input
  document.querySelectorAll('[data-input="couverts"]').forEach(inp => {
    inp.addEventListener('change', async (e) => {
      const wk = getWeekData(state.weekOffset);
      wk.days[e.target.dataset.date].couverts = parseInt(e.target.value) || 1;
      await saveData();
      render();
    });
  });

  // Receipt camera input
  const cam = document.getElementById('receipt-camera');
  if (cam && !cam.dataset.bound) {
    cam.dataset.bound = '1';
    cam.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) await processReceiptImage(file);
      e.target.value = '';
    });
  }
}

// Global click handler
document.addEventListener('click', (e) => {
  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;

  // If the closest action element is the backdrop, only fire when the click
  // was directly on the backdrop (not bubbling from a child like an input)
  if (actionEl.classList.contains('modal-backdrop') && e.target !== actionEl) {
    return;
  }
  handleAction(actionEl.dataset.action, actionEl);
});

// ============================================================
// INIT
// ============================================================
(async () => {
  try {
    // Détecte le lien d'invitation (avant tout le reste)
    detectInviteOnLoad();
    if (typeof setStep === 'function') setStep('connexion Firebase');
    await testFirebase();
    if (!firebaseReachable) {
      // Continue quand même — l'app marche en lecture seule depuis la dernière
      // session si on a localStorage, et les écritures réessaieront silencieusement.
      console.warn('Firebase non joignable au démarrage:', firebaseLastError);
    }

    if (typeof setStep === 'function') setStep('chargement profil');
    await loadProfile();

    // PIN gate check BEFORE loading sensitive data
    if (typeof setStep === 'function') setStep('verification securite');
    state.pinHashCached = await getPinHash();
    const unlocked = await isUnlocked();
    if (state.pinHashCached && !unlocked) {
      state.locked = true;
      state.data = defaultData();
      state.messages = [];
      render();
      return;
    }

    if (typeof setStep === 'function') setStep('chargement donnees');
    await loadData();
    if (typeof setStep === 'function') setStep('chargement messages');
    await loadMessages();
    if (typeof setStep === 'function') setStep('chargement membres');
    await loadMembers();
    await loadAllDms();

    installVisibilityListener();

    // Calage du pointeur de notif au démarrage pour éviter une rafale
    try {
      if (localStorage.getItem(NOTIF_LAST_SEEN_KEY) === null && state.messages && state.messages.length) {
        setLastNotifiedTimestamp(Math.max(...state.messages.map(m => m.timestamp || 0)));
      }
    } catch (e) {}

    if (!state.profile) {
      state.modal = { type: 'profile-setup' };
    } else {
      // Si profil existe déjà, publie la carte membre immédiatement
      try { await publishMember(); await loadMembers(); } catch (e) {}
    }

    if (typeof setStep === 'function') setStep('rendu UI');
    updateTitleBadge();
    render();

    // Démarre le poll Firebase pour la sync famille (messages + data)
    startBackgroundPolling();
    // Heartbeat pour la présence
    startHeartbeat();
  } catch (e) {
    if (typeof showErr === 'function') showErr('Init failed: ' + (e.message || e));
    throw e;
  }
})();
</script>
</body>
</html>
