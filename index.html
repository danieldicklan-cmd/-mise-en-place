function renderShopping() {
  const list = state.data.shoppingList;
  const suppliers = ['Boucher', 'Poissonnier', 'Maraîcher', 'Supermarché', 'Cave', 'Autre'];
  const grouped = {};
  list.forEach(item => {
    const s = item.supplier || 'Autre';
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(item);
  });

  const totalEst = list.reduce((s, i) => s + (i.estPrice || 0), 0);
  const checkedCount = list.filter(i => i.checked).length;

  const supplierIcons = {
    'Boucher': '🥩', 'Poissonnier': '🐟', 'Maraîcher': '🥕',
    'Supermarché': '🛒', 'Cave': '🍷', 'Autre': '📦',
  };

  return `
    <div class="budget-card" style="margin-bottom: 16px;">
      <div class="budget-label">Estimation totale</div>
      <div class="budget-amount num">${fmtMoney(totalEst).replace(' €','')}<span class="small"> €</span></div>
      <div class="budget-meta">
        <span>${list.length - checkedCount} à acheter</span>
        <span>${checkedCount}/${list.length} cochés</span>
      </div>
    </div>

    <div class="ai-suggestions">
      <button class="ai-suggestion" data-action="ai-build-shopping">${ICONS.sparkles} Génère ma liste depuis le planning</button>
      <button class="ai-suggestion" data-action="add-shop-item">${ICONS.plus} Ajouter un article</button>
    </div>

    ${list.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">🛒</div>
        <div class="empty-title">Aucune course pour le moment</div>
        <div>Ajoute un article ou demande à l'IA de générer ta liste</div>
      </div>
    ` : suppliers.filter(s => grouped[s]).map(s => `
      <div class="supplier-group">
        <div class="supplier-header">
          <div class="supplier-icon">${supplierIcons[s] || '📦'}</div>
          <div class="supplier-name">${s}</div>
          <div class="supplier-note">${grouped[s].length} article${grouped[s].length > 1 ? 's' : ''}</div>
        </div>
        ${grouped[s].map(item => `
          <div class="shop-item ${item.checked ? 'checked' : ''}" data-action="toggle-shop" data-id="${item.id}">
            <div class="checkbox ${item.checked ? 'checked' : ''}">${ICONS.check}</div>
            <div class="shop-info">
              <div class="shop-name">${item.name}</div>
              <div class="shop-qty">${item.qty || ''}</div>
            </div>
            <div class="shop-price num">${item.estPrice ? fmtMoney(item.estPrice) : ''}</div>
          </div>
        `).join('')}
      </div>
    `).join('')}
  `;
}

function renderTickets() {
  const allReceipts = state.data.receipts || [];
  const supplierIcons = {
    'Boucher': '🥩', 'Poissonnier': '🐟', 'Maraîcher': '🥕',
    'Supermarché': '🛒', 'Cave': '🍷', 'Boulanger': '🥖', 'Fromager': '🧀', 'Autre': '📦',
  };

  // Filter by period
  let filtered = allReceipts.slice();
  if (state.ticketPeriod === 'week') {
    filtered = getReceiptsForWeek(0);
  } else if (state.ticketPeriod === 'month') {
    filtered = getReceiptsForMonth();
  }

  // Sort by date desc
  filtered.sort((a, b) => b.date.localeCompare(a.date));

  const total = sumReceipts(filtered);
  const budget = state.data.settings.budgetWeekly;
  const periodLabel = state.ticketPeriod === 'week' ? 'Cette semaine' : state.ticketPeriod === 'month' ? 'Ce mois' : 'Total';

  // Group rendering
  let body = '';
  if (filtered.length === 0) {
    body = `
      <div class="empty">
        <div class="empty-icon">🧾</div>
        <div class="empty-title">Aucun ticket sur cette période</div>
        <div>Ajoute ton premier ticket pour suivre ta réalité dépensière</div>
      </div>
    `;
  } else if (state.ticketGroupBy === 'date') {
    // Group by date
    const byDate = {};
    filtered.forEach(r => { (byDate[r.date] = byDate[r.date] || []).push(r); });
    body = Object.entries(byDate).map(([date, items]) => {
      const d = new Date(date);
      const dayTotal = sumReceipts(items);
      return `
        <div class="supplier-group">
          <div class="supplier-header">
            <div class="supplier-icon" style="font-size:13px;font-weight:600;">${d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' })}</div>
            <div class="supplier-name">${fmtDay(d).charAt(0).toUpperCase() + fmtDay(d).slice(1)}</div>
            <div class="supplier-note num">${fmtMoney(dayTotal)}</div>
          </div>
          ${items.map(r => renderReceiptRow(r, supplierIcons)).join('')}
        </div>
      `;
    }).join('');
  } else {
    // Group by supplier
    const bySup = {};
    filtered.forEach(r => { (bySup[r.supplier || 'Autre'] = bySup[r.supplier || 'Autre'] || []).push(r); });
    // Sort suppliers by total desc
    const sortedSups = Object.keys(bySup).sort((a, b) => sumReceipts(bySup[b]) - sumReceipts(bySup[a]));
    body = sortedSups.map(sup => {
      const items = bySup[sup];
      const supTotal = sumReceipts(items);
      return `
        <div class="supplier-group">
          <div class="supplier-header">
            <div class="supplier-icon">${supplierIcons[sup] || '📦'}</div>
            <div class="supplier-name">${sup}</div>
            <div class="supplier-note num">${fmtMoney(supTotal)} · ${items.length}</div>
          </div>
          ${items.map(r => renderReceiptRow(r, supplierIcons, true)).join('')}
        </div>
      `;
    }).join('');
  }

  return `
    <div class="budget-card" style="margin-bottom: 14px;">
      <div class="budget-label">${periodLabel} · Réel dépensé</div>
      <div class="budget-amount num">${fmtMoney(total).replace(' €','')}<span class="small"> €</span></div>
      ${state.ticketPeriod === 'week' ? `
        <div class="budget-bar"><div class="budget-bar-fill" style="width: ${Math.min(100, (total/budget)*100)}%"></div></div>
        <div class="budget-meta">
          <span>Budget ${fmtMoney(budget)}</span>
          <span>${filtered.length} ticket${filtered.length > 1 ? 's' : ''}</span>
        </div>
      ` : `
        <div class="budget-meta" style="margin-top:8px;">
          <span>${filtered.length} ticket${filtered.length > 1 ? 's' : ''}</span>
        </div>
      `}
    </div>

    <div class="filter-bar">
      <button class="chip ${state.ticketPeriod === 'week' ? 'active' : ''}" data-action="ticket-period" data-period="week">Semaine</button>
      <button class="chip ${state.ticketPeriod === 'month' ? 'active' : ''}" data-action="ticket-period" data-period="month">Mois</button>
      <button class="chip ${state.ticketPeriod === 'all' ? 'active' : ''}" data-action="ticket-period" data-period="all">Tout</button>
      <div style="width:1px;background:var(--border);margin:0 4px;"></div>
      <button class="chip ${state.ticketGroupBy === 'date' ? 'active' : ''}" data-action="ticket-group" data-group="date">Par date</button>
      <button class="chip ${state.ticketGroupBy === 'supplier' ? 'active' : ''}" data-action="ticket-group" data-group="supplier">Par fournisseur</button>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="btn btn-primary" data-action="add-receipt" style="flex:1;">
        ${ICONS.camera} Scanner / saisir
      </button>
      <button class="btn btn-secondary" data-action="open-report" style="flex:0 0 auto;padding:11px 14px;">
        ${ICONS.chart} Rapport
      </button>
    </div>

    ${body}
  `;
}

function renderMemberRow(m, isMe) {
  const color = m.color || colorForMember(m.id);
  const state_p = presenceState(m.lastSeenAt);
  const dot = state_p === 'online' ? 'var(--sage)' : state_p === 'recent' ? 'var(--amber)' : 'var(--muted-2)';
  const unread = (state.unreadDms && state.unreadDms[m.id]) || 0;
  const lastDmId = dmChatId(getMyMemberId(), m.id);
  const lastDm = (state.dms[lastDmId] || []).slice(-1)[0];
  let preview = '';
  if (lastDm) {
    const txt = (lastDm.content || '').replace(/\s+/g, ' ').slice(0, 60);
    const who = lastDm.fromId === getMyMemberId() ? 'Toi : ' : '';
    preview = `<div style="font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${who}${escapeHtml(txt)}</div>`;
  }
  return `
    <div class="card" style="padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;${isMe ? '' : 'cursor:pointer;'}" ${isMe ? '' : `data-action="open-dm" data-id="${m.id}"`}>
      <div style="position:relative;flex-shrink:0;">
        <div style="width:44px;height:44px;border-radius:50%;background:${color};color:white;display:flex;align-items:center;justify-content:center;font-family:'Newsreader',serif;font-size:17px;font-weight:600;">${escapeHtml(initialsOf(m.name))}</div>
        <div style="position:absolute;bottom:0;right:0;width:12px;height:12px;border-radius:50%;background:${dot};border:2px solid var(--surface);"></div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="font-family:'Newsreader',serif;font-size:16px;font-weight:500;line-height:1.1;">${escapeHtml(m.name)}${isMe ? ' <span style="font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.1em;">(toi)</span>' : ''}</div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.08em;">${escapeHtml(m.role || 'Famille')} · ${escapeHtml(presenceLabel(m.lastSeenAt))}</div>
        ${preview}
      </div>
      ${!isMe ? `
        ${unread > 0 ? `<div style="background:var(--terracotta);color:white;min-width:22px;height:22px;padding:0 7px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">${unread}</div>` : ''}
        <div style="color:var(--muted-2);flex-shrink:0;">${ICONS.chevronR}</div>
      ` : ''}
    </div>
  `;
}

function renderEventCard(e, past = false) {
  const t = EVENT_TYPES[e.type] || EVENT_TYPES.other;
  const d = new Date(e.date);
  const dayShort = d.toLocaleDateString('fr-FR', { weekday: 'short' });
  const dayNum = d.getDate();
  const monthShort = d.toLocaleDateString('fr-FR', { month: 'short' });
  const today = fmtDate(new Date());
  const isToday = e.date === today;
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  const isTomorrow = e.date === fmtDate(tomorrow);
  const ribbon = isToday ? 'AUJ.' : isTomorrow ? 'DEMAIN' : '';
  const endLabel = e.endDate ? ` → ${new Date(e.endDate).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' })}` : '';

  return `
    <div class="card" style="padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;${past ? 'opacity:0.6;' : ''}" data-action="edit-event" data-id="${e.id}">
      <div style="text-align:center;flex-shrink:0;background:var(--paper-2);border-radius:10px;padding:8px 10px;min-width:54px;">
        <div style="font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">${dayShort}</div>
        <div style="font-family:'Newsreader',serif;font-size:22px;font-weight:600;color:var(--ink);line-height:1;margin:2px 0;">${dayNum}</div>
        <div style="font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;">${monthShort.replace('.','')}</div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
          <span style="font-size:18px;">${t.icon}</span>
          <span style="font-family:'Newsreader',serif;font-size:16px;font-weight:500;line-height:1.2;flex:1;min-width:0;">${escapeHtml(e.title)}${endLabel}</span>
          ${ribbon ? `<span style="background:var(--terracotta);color:white;padding:2px 7px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:0.06em;">${ribbon}</span>` : ''}
        </div>
        ${e.description ? `<div style="font-size:13px;color:var(--muted);line-height:1.4;margin-bottom:6px;">${escapeHtml(e.description)}</div>` : ''}
        ${e.affectsMeal && e.mealNote ? `
          <div style="background:rgba(212,150,69,.12);border-left:3px solid var(--amber);padding:8px 10px;border-radius:6px;font-size:12px;margin-top:6px;">
            <span style="font-weight:600;color:var(--amber);text-transform:uppercase;font-size:10px;letter-spacing:0.1em;">Impact repas</span><br>
            ${escapeHtml(e.mealNote)}
          </div>
        ` : ''}
        ${e.createdBy ? `<div style="font-size:10px;color:var(--muted-2);margin-top:6px;text-transform:uppercase;letter-spacing:0.08em;">Ajouté par ${escapeHtml(e.createdBy)}</div>` : ''}
      </div>
    </div>
  `;
}

function renderReceiptRow(r, icons, showDate = false) {
  const d = new Date(r.date);
  return `
    <div class="shop-item" data-action="edit-receipt" data-id="${r.id}">
      <div style="font-size:18px;flex-shrink:0;">${icons[r.supplier] || '📦'}</div>
      <div class="shop-info">
        <div class="shop-name">${r.supplier || 'Autre'}${showDate ? ' · ' + d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }) : ''}</div>
        <div class="shop-qty">${r.notes ? r.notes.slice(0, 60) + (r.notes.length > 60 ? '…' : '') : ' '}</div>
      </div>
      <div class="shop-price num" style="font-size:15px;font-weight:600;">${fmtMoney(r.total)}</div>
    </div>
  `;
}

// --- STOCK (Inventory) ---
function renderStock() {
  const inv = state.data.inventory;
  const grouped = {};
  inv.forEach(i => {
    if (!grouped[i.category]) grouped[i.category] = [];
    grouped[i.category].push(i);
  });

  const alerts = inv.filter(i => i.qty <= i.threshold);
  const catIcons = { 'Réserve sèche': '🌾', 'Frigo': '❄️', 'Congélateur': '🧊', 'Autre': '📦' };

  return `
    <div class="page-sub">${inv.length} articles · ${alerts.length} en alerte</div>
    <h1 class="page-title">Le <em>stock</em>.</h1>

    <div class="ai-suggestions" style="margin-top: 14px;">
      <button class="ai-suggestion" data-action="add-stock">${ICONS.plus} Ajouter un article</button>
      <button class="ai-suggestion" data-action="ai-stock-meal">${ICONS.sparkles} Que cuisiner avec ?</button>
    </div>

    ${Object.entries(grouped).map(([cat, items]) => `
      <div class="stock-section-title">
        <span style="font-size:18px;">${catIcons[cat] || '📦'}</span>
        ${cat}
        <span style="font-size:11px;color:var(--muted);font-weight:400;text-transform:uppercase;letter-spacing:0.12em;">${items.length}</span>
      </div>
      ${items.map(i => `
        <div class="stock-item ${i.qty <= i.threshold ? 'alert' : ''}">
          <div class="stock-name">${i.name}</div>
          ${i.qty <= i.threshold ? '<div class="stock-alert-badge">Bas</div>' : ''}
          <div class="stock-qty-controls">
            <button class="qty-btn" data-action="qty-dec" data-id="${i.id}">−</button>
            <div class="qty-value num">${i.qty}<span class="unit"> ${i.unit}</span></div>
            <button class="qty-btn" data-action="qty-inc" data-id="${i.id}">+</button>
          </div>
        </div>
      `).join('')}
    `).join('')}
  `;
}

function renderModal() {
  if (!state.modal) return '';
  const m = state.modal;

  if (m.type === 'service-picker') {
    const wk = getWeekData(state.weekOffset);
    const day = wk.days[m.date];
    const currentDish = day.services[m.service];

    const serviceLabels = { dejeuner: 'Déjeuner (matin)', midi: 'Midi', gouter: 'Goûter', soir: 'Soir' };

    // Filter menu by relevant category for this service (suggestion only)
    const allDishes = state.data.menuBank;
    const categoryHints = {
      dejeuner: ['Petit-déj'],
      midi: ['Midi rapide', 'Pâtes', 'Végé', 'Volaille', 'Viande rouge', 'Poisson'],
      gouter: ['Goûter'],
      soir: ['Volaille', 'Viande rouge', 'Poisson', 'Végé', 'Pâtes']
    };
    const suggested = allDishes.filter(d => categoryHints[m.service]?.includes(d.category));
    const others = allDishes.filter(d => !categoryHints[m.service]?.includes(d.category));

    return `
      <div class="modal-backdrop" data-action="close-modal">
        <div class="modal" data-stop>
          <div class="modal-handle"></div>
          <div class="modal-header">
            <div class="modal-title">${serviceLabels[m.service]}</div>

          </div>
          <div class="modal-body">
            <div class="field">
              <label class="field-label">Nb couverts</label>
              <input type="number" class="field-input num" value="${day.couverts}" data-input="couverts" data-date="${m.date}">
            </div>
            ${currentDish ? `
              <button class="btn btn-secondary btn-full" data-action="clear-service" data-service="${m.service}" data-date="${m.date}" style="margin-bottom: 14px;">
                Vider ce service
              </button>
            ` : ''}
            ${suggested.length > 0 ? `
              <div class="picker-divider">Suggéré pour ${serviceLabels[m.service]}</div>

                <div class="picker-item" data-action="select-dish" data-name="${d.name.replace(/"/g, '&quot;')}" data-service="${m.service}" data-date="${m.date}">
                  <div>
                    <div class="picker-item-name">${d.name}</div>
                    <div class="dish-meta">
                      <span class="dish-tag">${d.category}</span>
                      <span>${fmtMoney(d.costPerPerson)}/pers</span>

                  </div>

              ${others.map(d => `
                <div class="picker-item" data-action="select-dish" data-name="${d.name.replace(/"/g, '&quot;')}" data-service="${m.service}" data-date="${m.date}">
                  <div>
                    <div class="picker-item-name">${d.name}</div>
                    <div class="dish-meta">
                      <span class="dish-tag">${d.category}</span>
                      <span>${fmtMoney(d.costPerPerson)}/pers</span>
                    </div>
                  </div>
                  ${currentDish === d.name ? '<div style="color:var(--terracotta);">●</div>' : ''}
                </div>
              `).join('')}
            ` : ''}
          </div>
        </div>
      </div>
    `;
  }

  if (m.type === 'dish-form') {
    const d = m.dish || { name: '', category: 'Volaille', season: 'Toutes', costPerPerson: 0, prepTime: 30, rating: 4, ingredients: '' };
    const isNew = !m.dish;
    return `
      <div class="modal-backdrop" data-action="close-modal">
        <div class="modal" data-stop>
          <div class="modal-handle"></div>
          <div class="modal-header">
            <div class="modal-title">${isNew ? 'Nouveau plat' : 'Modifier'}</div>

                <input class="field-input" id="dish-cat" value="${d.category}" placeholder="Volaille, Poisson...">
              </div>
              <div class="field">
                <label class="field-label">Saison</label>
                <input class="field-input" id="dish-season" value="${d.season}" placeholder="Toutes">
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label class="field-label">Coût / pers (€)</label>
                <input type="number" step="0.10" class="field-input num" id="dish-cost" value="${d.costPerPerson}">
              </div>
              <div class="field">
                <label class="field-label">Prép (min)</label>

              <label class="field-label">Ingrédients clés</label>

              <div style="margin-top:18px;padding:14px 16px;background:var(--paper-2);border-radius:12px;font-size:13px;color:var(--muted);">

              </div>
            `}
          `}
        </div>
      `;
    } else if (sub === 'dm') {
      // Vue DM 1-à-1
      const other = findMember(state.activeDmId);
      const chatId = other ? dmChatId(myId, other.id) : null;
      const thread = (chatId && state.dms[chatId]) ? state.dms[chatId] : [];
      const sorted = [...thread].sort((a, b) => a.timestamp - b.timestamp);
      const otherColor = other ? (other.color || colorForMember(other.id)) : 'var(--terracotta)';
      content = `
        <div style="padding:12px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--paper-2);">
          <button class="icon-btn" data-action="family-tab" data-sub="members" title="Retour" style="width:36px;height:36px;">${ICONS.chevronL}</button>
          ${other ? `
            <div style="width:38px;height:38px;border-radius:50%;background:${otherColor};color:white;display:flex;align-items:center;justify-content:center;font-family:'Newsreader',serif;font-size:15px;font-weight:600;">${escapeHtml(initialsOf(other.name))}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-family:'Newsreader',serif;font-size:16px;font-weight:500;line-height:1.1;">${escapeHtml(other.name)}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;">
                <span style="width:7px;height:7px;border-radius:50%;background:${presenceState(other.lastSeenAt) === 'online' ? 'var(--sage)' : presenceState(other.lastSeenAt) === 'recent' ? 'var(--amber)' : 'var(--muted-2)'};"></span>
                ${escapeHtml(presenceLabel(other.lastSeenAt))} · ${escapeHtml(other.role || 'Famille')}
              </div>
            </div>
          ` : `<div style="flex:1;color:var(--muted);">Membre introuvable</div>`}
        </div>
        <div class="chat-messages" id="fam-dm-messages">
          ${sorted.length === 0 ? `
            <div style="text-align:center;padding:30px 20px;color:var(--muted);">
              <div style="font-family:'Newsreader',serif;font-size:18px;color:var(--ink);margin-bottom:8px;">Conversation privée</div>
              <div style="font-size:13px;">Échangez directement, juste vous deux.</div>
            </div>
          ` : ''}
          ${sorted.map(msg => {
            const isMe = msg.fromId === myId;
            const t = new Date(msg.timestamp);
            const timeStr = t.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            const today = new Date(); today.setHours(0,0,0,0);
            const msgDay = new Date(t); msgDay.setHours(0,0,0,0);
            const dayDiff = Math.floor((today - msgDay) / 86400000);
            const dateStr = dayDiff === 0 ? "Aujourd'hui" : dayDiff === 1 ? 'Hier' : t.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
            return `
              <div style="display:flex;flex-direction:column;${isMe ? 'align-items:flex-end' : 'align-items:flex-start'};">
                <div class="msg ${isMe ? 'user' : 'assistant'}" style="${isMe ? '' : 'background:var(--surface);border:1px solid var(--border);'}">${formatMd(msg.content)}</div>
                <div style="font-size:9px;color:var(--muted-2);margin-top:3px;${isMe ? 'padding-right:14px;' : 'padding-left:14px;'}">${dateStr} · ${timeStr}</div>
              </div>
            `;
          }).join('')}
        </div>
        <div class="chat-input-row">
          <input class="chat-input" id="fam-dm-input" placeholder="Message privé à ${other ? escapeHtml(other.name) : '...'}" value="${escapeHtml(state.dmDraft || '')}" oninput="state.dmDraft=this.value" onkeydown="if(event.key==='Enter')handleDmSend()" ${other ? '' : 'disabled'}>
          <button class="chat-send" onclick="handleDmSend()" ${other ? '' : 'disabled'}>${ICONS.send}</button>
        </div>
      `;
    } else {
      // Events tab
      const upcoming = getUpcomingEvents(60);
      const past = getAllEvents().filter(e => {
        const ref = e.endDate || e.date;
        return ref < fmtDate(new Date());
      }).slice(0, 10);

      content = `
        <div style="flex:1;overflow-y:auto;padding:18px 20px;">
          <button class="btn btn-primary btn-full" data-action="add-event" style="margin-bottom: 18px;">
            ${ICONS.plus} Nouvel événement
          </button>

          ${upcoming.length === 0 && past.length === 0 ? `
            <div class="empty">
              <div class="empty-icon">📅</div>
              <div class="empty-title">Aucun événement</div>
              <div>Ajoute anniversaires, invités, absences, rendez-vous...</div>
            </div>
          ` : ''}

          ${upcoming.length > 0 ? `
            <div class="section-title">À venir</div>
            ${upcoming.map(e => renderEventCard(e)).join('')}
          ` : ''}

          ${past.length > 0 ? `
            <div class="section-title" style="margin-top:24px;">Passés (10 derniers)</div>
            ${past.map(e => renderEventCard(e, true)).join('')}
          ` : ''}
        </div>
      `;
    }

    // Onglets : on cache la barre quand on est dans la vue DM (back via flèche)
    const showTabs = sub !== 'dm';

    return `
      <div class="modal-backdrop" data-action="close-modal">
        <div class="modal" data-stop style="height: 92vh; height: 92dvh;">
          <div class="modal-handle"></div>
          <div class="modal-header">
            <div class="modal-title" style="display:flex;align-items:center;gap:8px;">
              <span style="color:var(--sage);">${ICONS.users}</span>
              Famille${state.members.length > 0 ? ` <span style="font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.12em;margin-left:4px;">${state.members.length} membre${state.members.length > 1 ? 's' : ''}</span>` : ''}
            </div>
            <div style="display:flex;gap:4px;align-items:center;">
              <button class="icon-btn" data-action="refresh-family" title="Rafraîchir">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:20px;height:20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
              </button>
              <button class="icon-btn" data-action="close-modal">${ICONS.x}</button>
            </div>
          </div>
          ${showTabs ? `
          <div style="display:flex;gap:4px;background:var(--paper-2);padding:4px;margin:12px 18px 0;border-radius:12px;flex-shrink:0;">
            <button class="subtab" data-action="family-tab" data-sub="messages" style="flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:600;${sub === 'messages' ? 'background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);' : 'background:transparent;color:var(--muted);'}">
              Famille${state.unreadCount > 0 && sub !== 'messages' ? ` <span style="background:var(--terracotta);color:white;padding:1px 6px;border-radius:100px;font-size:10px;margin-left:4px;">${state.unreadCount}</span>` : ''}
            </button>
            <button class="subtab" data-action="family-tab" data-sub="members" style="flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:600;${sub === 'members' ? 'background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);' : 'background:transparent;color:var(--muted);'}">
              Membres${totalUnreadDms > 0 && sub !== 'members' && sub !== 'dm' ? ` <span style="background:var(--terracotta);color:white;padding:1px 6px;border-radius:100px;font-size:10px;margin-left:4px;">${totalUnreadDms}</span>` : ''}
            </button>
            <button class="subtab" data-action="family-tab" data-sub="events" style="flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:600;${sub === 'events' ? 'background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);' : 'background:transparent;color:var(--muted);'}">
              Événements${upcomingCount > 0 ? ` <span style="color:var(--terracotta);font-weight:700;">·${upcomingCount}</span>` : ''}
            </button>
          </div>
          ` : ''}
          <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
            ${content}
          </div>
        </div>
      </div>
    `;
  }

  if (m.type === 'invite') {
    const url = state.inviteUrl || '';
    return `
      <div class="modal-backdrop" data-action="close-modal">
        <div class="modal" data-stop>
          <div class="modal-handle"></div>
          <div class="modal-header">
            <div class="modal-title">Inviter un membre</div>
            <button class="icon-btn" data-action="close-modal">${ICONS.x}</button>
          </div>
          <div class="modal-body">
            <p style="font-size:13px;color:var(--muted);margin:0 0 18px;line-height:1.5;">
              Partage ce lien à un membre de la famille. À l'ouverture, il choisira son prénom et entrera le <strong style="color:var(--ink);">même code PIN</strong> que toi pour rejoindre.
            </p>

            <div style="display:flex;justify-content:center;margin:16px 0 20px;">
              <div style="background:var(--paper-2);border:1px solid var(--border);border-radius:14px;padding:14px;">
                <img src="${qrImgUrl(url)}" alt="QR code d'invitation" style="display:block;width:220px;height:220px;border-radius:8px;" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
                <div style="display:none;text-align:center;color:var(--muted);font-size:12px;padding:40px 10px;">QR indisponible (hors-ligne)<br>Utilise le lien ci-dessous.</div>
              </div>
            </div>

            <div style="background:var(--paper-2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px;">
              <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);font-weight:600;margin-bottom:6px;">Lien d'invitation</div>
              <div style="font-family:monospace;font-size:11px;word-break:break-all;color:var(--ink);line-height:1.4;">${escapeHtml(url)}</div>
            </div>

            <div style="display:flex;gap:8px;">
              <button class="btn btn-secondary" style="flex:1;" data-action="copy-invite">📋 Copier</button>
              <button class="btn btn-primary" style="flex:1;" data-action="share-invite">↗ Partager</button>
            </div>

            <div style="margin-top:18px;padding:12px 14px;background:rgba(185,92,44,0.08);border:1px solid rgba(185,92,44,0.2);border-radius:12px;font-size:12px;color:var(--ink-2);line-height:1.5;">
              <strong style="color:var(--terracotta);">⚠ N'oublie pas :</strong> communique aussi le <strong>code PIN</strong> à la personne (de vive voix ou via un canal sécurisé). Sans le PIN, elle ne pourra pas déchiffrer les messages et données partagées.
            </div>
          </div>
        </div>
      </div>
    `;
  }

  if (m.type === 'event-form') {
    const e = m.event || {
      date: fmtDate(new Date()), endDate: '',
      title: '', type: 'guests',
      description: '', affectsMeal: true, mealNote: '',
    };
    const isNew = !m.event;
    return `
      <div class="modal-backdrop" data-action="close-modal">
        <div class="modal" data-stop>
          <div class="modal-handle"></div>
          <div class="modal-header">
            <div class="modal-title">${isNew ? 'Nouvel événement' : 'Modifier événement'}</div>
            <button class="icon-btn" data-action="close-modal">${ICONS.x}</button>
          </div>
          <div class="modal-body">
            <div class="field">
              <label class="field-label">Titre</label>
              <input class="field-input" id="evt-title" value="${escapeHtml(e.title)}" placeholder="Ex : Anniversaire de Léa" autofocus>
            </div>
            <div class="field">
              <label class="field-label">Type</label>
              <select class="field-input" id="evt-type">
                ${Object.entries(EVENT_TYPES).map(([k, v]) => `<option value="${k}" ${e.type === k ? 'selected' : ''}>${v.icon} ${v.label}</option>`).join('')}
              </select>
            </div>
            <div class="field-row">
              <div class="field">
                <label class="field-label">Date</label>
                <input type="date" class="field-input num" id="evt-date" value="${e.date}">
              </div>
              <div class="field">
                <label class="field-label">Fin (si plusieurs jours)</label>
                <input type="date" class="field-input num" id="evt-enddate" value="${e.endDate || ''}">
              </div>
            </div>
            <div class="field">
              <label class="field-label">Description</label>
              <textarea class="field-input" id="evt-desc" placeholder="Détails, contexte...">${e.description || ''}</textarea>
            </div>
            <label style="display:flex;align-items:center;gap:10px;padding:14px;background:var(--paper-2);border-radius:12px;margin-bottom:10px;cursor:pointer;">
              <input type="checkbox" id="evt-affects" ${e.affectsMeal ? 'checked' : ''} style="width:18px;height:18px;accent-color:var(--terracotta);">
              <span style="font-weight:500;font-size:14px;">Cet événement affecte les repas</span>
            </label>
            <div class="field">
              <label class="field-label">Note pour les repas (optionnel)</label>
              <textarea class="field-input" id="evt-meal" placeholder="Ex : Gâteau au chocolat pour 8 personnes, menu festif">${e.mealNote || ''}</textarea>
            </div>
          </div>
          <div class="modal-footer">
            ${!isNew ? `<button class="btn btn-secondary" data-action="delete-event" data-id="${e.id}">${ICONS.trash}</button>` : ''}
            <button class="btn btn-primary btn-full" data-action="save-event" data-id="${e.id || ''}">${isNew ? 'Créer' : 'Enregistrer'}</button>
          </div>
        </div>
      </div>
    `;
  }

  if (m.type === 'chat') {
    return `
      <div class="modal-backdrop" data-action="close-modal">
        <div class="modal" data-stop style="height: 92vh; height: 92dvh;">
          <div class="modal-handle"></div>
          <div class="modal-header">
            <div class="modal-title">
              <span style="color: var(--terracotta);">${ICONS.sparkles}</span>
              Assistant
            </div>
            <button class="icon-btn" data-action="close-modal">${ICONS.x}</button>
          </div>
          <div class="chat-messages" id="chat-messages">
            ${state.chatMessages.length === 0 ? `
              <div style="text-align: center; padding: 20px; color: var(--muted);">
                <div style="font-family: 'Newsreader', serif; font-size: 18px; color: var(--ink); margin-bottom: 8px;">Comment puis-je t'aider ?</div>
                <div style="font-size: 13px;">Demande-moi une suggestion de menu, un calcul de coût, une recette adaptée à ton stock…</div>
              </div>
            ` : ''}
            ${state.chatMessages.map(msg => `
              <div class="msg ${msg.role}">${msg.role === 'assistant' ? formatMd(msg.content) : escapeHtml(msg.content)}</div>
            `).join('')}
            ${state.chatLoading ? `
              <div class="msg thinking">
                <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
              </div>
            ` : ''}
          </div>
          <div class="chat-input-row">
            <input class="chat-input" id="chat-input" placeholder="Pose ta question..." ${state.chatLoading ? 'disabled' : ''} onkeydown="if(event.key==='Enter')handleChatSend()">
            <button class="chat-send" id="chat-send" onclick="handleChatSend()" ${state.chatLoading ? 'disabled' : ''}>${ICONS.send}</button>
          </div>
        </div>
      </div>
    `;
  }

  if (m.type === 'monthly-report') {
    return renderMonthlyReport();
  }

  return '';
}

// ============================================================
// MONTHLY REPORT
// ============================================================
function renderMonthlyReport() {
  const offset = state.reportMonthOffset || 0;
  const { start } = getMonthRange(offset);
  const receipts = getReceiptsForMonth(offset);
  const total = sumReceipts(receipts);
  const monthlyBudget = (state.data.settings.budgetWeekly || 0) * (365 / 12 / 7);
  const pct = monthlyBudget > 0 ? (total / monthlyBudget) * 100 : 0;
  const avg = receipts.length ? total / receipts.length : 0;

  const daysCount = daysInMonth(start.getFullYear(), start.getMonth());
  const dailyTotals = new Array(daysCount).fill(0);
  receipts.forEach(r => {
    const d = parseInt(r.date.slice(8, 10), 10);
    if (d >= 1 && d <= daysCount) dailyTotals[d - 1] += parseFloat(r.total) || 0;
  });
  const maxDaily = Math.max(1, ...dailyTotals);

  const bySup = {};
  receipts.forEach(r => {
    const k = r.supplier || 'Autre';
    bySup[k] = (bySup[k] || 0) + (parseFloat(r.total) || 0);
  });
  const supEntries = Object.entries(bySup).sort((a, b) => b[1] - a[1]);
  const supplierIcons = {
    'Boucher': '🥩', 'Poissonnier': '🐟', 'Maraîcher': '🥕',
    'Supermarché': '🛒', 'Cave': '🍷', 'Boulanger': '🥖', 'Fromager': '🧀', 'Autre': '📦',
  };

  const topTickets = [...receipts]
    .sort((a, b) => (parseFloat(b.total) || 0) - (parseFloat(a.total) || 0))
    .slice(0, 5);

  const prevReceipts = getReceiptsForMonth(offset - 1);
  const prevTotal = sumReceipts(prevReceipts);
  const delta = prevTotal > 0 ? ((total - prevTotal) / prevTotal) * 100 : 0;

  const overBudget = total > monthlyBudget;
  const isCurrentMonth = offset === 0;

  return `
    <div class="modal-backdrop" data-action="close-modal">
      <div class="modal" data-stop style="height: 92vh; height: 92dvh;">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div class="modal-title" style="display:flex;align-items:center;gap:8px;">
            <span style="color:var(--terracotta);">${ICONS.chart}</span>
            Rapport mensuel
          </div>
          <button class="icon-btn" data-action="close-modal">${ICONS.x}</button>
        </div>
        <div class="modal-body">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;">
            <button class="icon-btn" data-action="report-prev">${ICONS.chevronL}</button>
            <div style="text-align:center;flex:1;">
              <div style="font-family:'Newsreader',serif;font-size:17px;font-weight:500;text-transform:capitalize;">${monthLabel(start)}</div>
              ${!isCurrentMonth ? `<button class="btn-ghost" data-action="report-current" style="font-size:11px;padding:2px 8px;">Revenir au mois courant</button>` : `<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;font-weight:600;">Mois en cours</div>`}
            </div>
            <button class="icon-btn" data-action="report-next" ${offset >= 0 ? 'style="opacity:0.3;pointer-events:none;"' : ''}>${ICONS.chevronR}</button>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;">
              <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);font-weight:600;">Total dépensé</div>
              <div style="font-family:'Newsreader',serif;font-size:22px;font-weight:500;margin-top:2px;color:${overBudget ? 'var(--rose)' : 'var(--sage-dark)'};font-variant-numeric:tabular-nums;">${fmtMoney(total)}</div>
              <div style="font-size:10px;color:var(--muted);margin-top:2px;">${pct.toFixed(0)}% du budget mensuel</div>
            </div>
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;">
              <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);font-weight:600;">Budget estimé</div>
              <div style="font-family:'Newsreader',serif;font-size:22px;font-weight:500;margin-top:2px;font-variant-numeric:tabular-nums;">${fmtMoney(monthlyBudget)}</div>
              <div style="font-size:10px;color:var(--muted);margin-top:2px;">${overBudget ? `+${fmtMoney(total - monthlyBudget)} au-dessus` : `${fmtMoney(monthlyBudget - total)} restant`}</div>
            </div>
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;">
              <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);font-weight:600;">Tickets</div>
              <div style="font-family:'Newsreader',serif;font-size:22px;font-weight:500;margin-top:2px;font-variant-numeric:tabular-nums;">${receipts.length}</div>
              <div style="font-size:10px;color:var(--muted);margin-top:2px;">${receipts.length ? 'Panier moy. ' + fmtMoney(avg) : 'Aucun ticket'}</div>
            </div>
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;">
              <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);font-weight:600;">Vs mois préc.</div>
              <div style="font-family:'Newsreader',serif;font-size:22px;font-weight:500;margin-top:2px;color:${delta > 0 ? 'var(--rose)' : delta < 0 ? 'var(--sage-dark)' : 'var(--ink)'};font-variant-numeric:tabular-nums;">
                ${prevTotal > 0 ? (delta > 0 ? '+' : '') + delta.toFixed(0) + '%' : '—'}
              </div>
              <div style="font-size:10px;color:var(--muted);margin-top:2px;">${prevTotal > 0 ? fmtMoney(prevTotal) : 'Pas de référence'}</div>
            </div>
          </div>

          ${receipts.length === 0 ? `
            <div class="empty" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;">
              <div class="empty-icon">📊</div>
              <div class="empty-title">Aucun ticket ce mois</div>
              <div>Scanne ou saisis tes tickets pour voir ton rapport</div>
            </div>
          ` : `
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;">
              <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);font-weight:600;margin-bottom:10px;">Dépenses par jour</div>
              ${dailyTotals.map((v, i) => {
                const w = maxDaily > 0 ? (v / maxDaily) * 100 : 0;
                return `
                  <div style="display:grid;grid-template-columns:30px 1fr 60px;align-items:center;gap:8px;padding:4px 0;font-size:11px;">
                    <div style="color:var(--muted);font-weight:500;font-variant-numeric:tabular-nums;">${String(i + 1).padStart(2, '0')}</div>
                    <div style="height:8px;background:var(--paper-2);border-radius:4px;overflow:hidden;">

            ${topTickets.length > 0 ? `
              <div>
                <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);font-weight:600;margin-bottom:8px;">Plus gros tickets</div>
                ${topTickets.map(r => {
                  const d = new Date(r.date);
                  return `
                    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:5px;cursor:pointer;" data-action="edit-receipt" data-id="${esc(r.id)}">
                      <div style="font-size:18px;">${supplierIcons[r.supplier] || '📦'}</div>
                      <div style="flex:1;min-width:0;">
                        <div style="font-weight:500;font-size:13px;">${esc(r.supplier || 'Autre')}</div>
                        <div style="font-size:10px;color:var(--muted);margin-top:1px;">${d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' })}${r.notes ? ' · ' + esc(r.notes.slice(0, 40)) : ''}</div>
                      </div>
                      <div style="font-weight:600;font-variant-numeric:tabular-nums;font-size:14px;color:var(--terracotta);">${fmtMoney(r.total)}</div>
                    </div>
                  `;
                }).join('')}
              </div>
            ` : ''}
          `}
        </div>
      </div>
    </div>
  `;
}
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function esc(s) { return escapeHtml(s); }
function formatMd(s) {
  let h = escapeHtml(s);
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/\n/g, '<br>');
  return h;
}

// ============================================================
// CLAUDE API INTEGRATION
// ============================================================
// Deux modes possibles :
//
// 1. MODE PROXY (recommandé pour usage partagé) — Cloudflare Worker / Vercel
//    function qui forwarde à l'API Anthropic avec ta clé stockée côté serveur.
//    Renseigne AI_BACKEND_URL ci-dessous.
//
// 2. MODE DIRECT NAVIGATEUR (rapide pour usage perso/famille) — Chaque device
//    stocke sa propre clé API Anthropic en localStorage (jamais persistée ailleurs).
//    Les requêtes vont directement à api.anthropic.com avec le header
//    `anthropic-dangerous-direct-browser-access`. La clé reste sur le device.
const AI_BACKEND_URL = ''; // ex : 'https://mon-proxy.workers.dev/chat'
const AI_MODEL = 'claude-sonnet-4-5-20250929';
const AI_MODEL_VISION = 'claude-sonnet-4-5-20250929';
const AI_KEY_STORAGE = 'chef:apikey:v1'; // LOCAL device

function getAIKey() {
  try { return localStorage.getItem(AI_KEY_STORAGE) || ''; }
  catch (e) { return ''; }
}
function setAIKey(key) {
  try {
    if (key && key.trim()) localStorage.setItem(AI_KEY_STORAGE, key.trim());
    else localStorage.removeItem(AI_KEY_STORAGE);
  } catch (e) {}
}
function maskAIKey(key) {
  if (!key) return '';
  if (key.length < 12) return '••••';
  return key.slice(0, 7) + '••••••' + key.slice(-4);
}
function aiAvailable() {
  return !!AI_BACKEND_URL || !!getAIKey();
}
function aiMode() {
  if (AI_BACKEND_URL) return 'proxy';
  if (getAIKey()) return 'direct';
  return 'off';
}

async function fetchAnthropic(body) {
  const mode = aiMode();
  if (mode === 'proxy') {
    return fetch(AI_BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
  }
  if (mode === 'direct') {
    return fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getAIKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify(body),
    });
  }
  throw new Error('AI not configured');
}

async function callClaude(systemPrompt, userMessage, conversationHistory = []) {
  if (!aiAvailable()) {
    return "**Assistant IA non configuré.**\n\nVa dans Réglages → IA Claude → colle ta clé API Anthropic (obtiens-en une sur console.anthropic.com, ~5€ de crédit offert).\n\n*La clé reste sur ce device, jamais ailleurs.*";
  }
  const messages = [...conversationHistory, { role: 'user', content: userMessage }];
  try {
    const res = await fetchAnthropic({
      model: AI_MODEL,
      max_tokens: 1000,
      system: systemPrompt,
      messages: messages,
    });
    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      throw new Error('HTTP ' + res.status + (errText ? ' — ' + errText.slice(0, 200) : ''));
    }
    const data = await res.json();
    if (data && data.content) {
      return data.content.map(b => b.text || '').join('\n').trim();
    }
    return 'Désolé, pas de réponse.';
  } catch (e) {
    console.error('Claude API error:', e);
    return 'Erreur IA : ' + (e.message || 'inconnue') + '. Vérifie ta clé API.';
  }
}

// OCR ticket de caisse via Claude Vision
async function ocrReceipt(imageDataUrl) {
  if (!aiAvailable()) return null;
  const m = imageDataUrl.match(/^data:(image\/\w+);base64,(.+)$/);
  if (!m) return null;
  const mediaType = m[1];
  const base64 = m[2];
  try {
    const res = await fetchAnthropic({
      model: AI_MODEL_VISION,
      max_tokens: 600,
      system: "Tu extrais les infos d'un ticket de caisse. Réponds UNIQUEMENT en JSON (pas de texte hors JSON, pas de code fence) : {\"date\":\"YYYY-MM-DD\"|null,\"supplier\":\"Boucher|Poissonnier|Maraîcher|Supermarché|Cave|Boulanger|Fromager|Autre\",\"total\":nombre|null,\"notes\":\"résumé court\"}. Pour supplier, choisis selon l'enseigne (Carrefour/Delhaize/Colruyt = Supermarché). Si info manque, utilise null.",
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: 'Extrais date, fournisseur, total TTC, résumé court. JSON strict.' }
        ]
      }]
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('').trim();
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) return null;
    const parsed = JSON.parse(match[0]);
    return {
      date: parsed.date && /^\d{4}-\d{2}-\d{2}$/.test(parsed.date) ? parsed.date : null,
      supplier: parsed.supplier || null,
      total: typeof parsed.total === 'number' ? parsed.total : (parseFloat(parsed.total) || null),
      notes: parsed.notes || '',
    };
  } catch (e) {
    console.error('OCR error:', e);
    return null;
  }
}

// Correspondance "moment" du format d'échange -> clé de service interne.
const MOMENT_TO_SERVICE = {
  'matin': 'dejeuner', 'petit-dejeuner': 'dejeuner', 'petit-déjeuner': 'dejeuner',
  'dejeuner': 'dejeuner', 'déjeuner': 'dejeuner',
  'midi': 'midi', 'gouter': 'gouter', 'goûter': 'gouter', 'soir': 'soir',
};

// La vue Courses ne rend que des fournisseurs connus : on mappe une catégorie
// d'import (ex. "Légumes & fruits", "Protéines") vers le fournisseur le plus proche.
function categoryToSupplier(nom) {
  const KNOWN = ['Boucher', 'Poissonnier', 'Maraîcher', 'Supermarché', 'Cave', 'Autre'];
  if (KNOWN.includes(nom)) return nom;
  const n = (nom || '').toLowerCase();
  if (/poisson|fruits de mer|crustac/.test(n)) return 'Poissonnier';
  if (/légume|legume|fruit|maraîch|maraich|primeur/.test(n)) return 'Maraîcher';
  if (/viande|boucher|protéine|proteine|volaille|charcut/.test(n)) return 'Boucher';
  if (/vin|cave|boisson|alcool/.test(n)) return 'Cave';
  return 'Supermarché';
}

// Lundi (00:00 local) de la semaine contenant dateStr (YYYY-MM-DD).
function mondayOf(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return null;
  const day = d.getDay() === 0 ? 7 : d.getDay();
  d.setDate(d.getDate() - day + 1);
  d.setHours(0, 0, 0, 0);
  return d;
}

// Construit le document d'export au format d'échange (semaine + courses + plats + inventaire).
function buildExportJSON(weekOffset = 0) {
  const settings = state.data.settings || {};
  const couvertsDef = settings.defaultCouverts || 1;

  // --- semaine ---
  const wk = getWeekData(weekOffset);
  const dateKeys = Object.keys(wk.days);
  let budgetTotal = 0;
  const jours = dateKeys.map(dateKey => {
    const day = wk.days[dateKey];
    const personnes = day.couverts || couvertsDef;
    const repas = ['dejeuner', 'midi', 'gouter', 'soir']
      .filter(k => day.services[k])
      .map(k => {
        const dish = findDish(day.services[k]);
        const cout = dish ? (dish.costPerPerson || 0) : 0;
        budgetTotal += cout * personnes;
        return {
          moment: k,
          plat: day.services[k],
          categorie: dish ? dish.category : '',
          cout_personne: cout,
          temps_prep: dish ? (dish.prepTime || 0) : 0,
          personnes,
        };
      });
    return { jour: fmtDay(new Date(dateKey + 'T00:00:00')), date: dateKey, repas };
  });

  // --- courses (groupées par fournisseur) ---
  const grouped = {};
  (state.data.shoppingList || []).forEach(it => {
    const g = it.supplier || 'Autre';
    (grouped[g] = grouped[g] || []).push({
      produit: it.name,
      quantite: it.qty || '',
      unite: '',
      prix_estime: it.estPrice || 0,
    });
  });

  // --- référentiel de plats ---
  const platsValides = (state.data.menuBank || []).map(d => ({
    id: d.id,
    nom: d.name,
    categorie: d.category,
    cout_personne: d.costPerPerson || 0,
    temps_prep: d.prepTime || 0,
    ingredients: typeof d.ingredients === 'string'
      ? d.ingredients.split(',').map(s => ({ nom: s.trim() })).filter(x => x.nom)
      : (Array.isArray(d.ingredients) ? d.ingredients : []),
    tags: d.tags || [],
  }));

  // --- inventaire ---
  const produitsInv = (state.data.inventory || []).map(it => ({
    nom: it.name,
    quantite_actuelle: it.qty,
    unite: it.unit,
    seuil_alerte: it.threshold,
    categorie: it.category,
    statut: (typeof it.qty === 'number' && typeof it.threshold === 'number' && it.qty <= it.threshold) ? 'À_racheter' : 'OK',
  }));

  return {
    semaine: {
      date_debut: dateKeys[0] || getWeekKey(weekOffset),
      budget_total: Math.round(budgetTotal * 100) / 100,
      jours,
    },
    courses: {
      date_generation: fmtDate(new Date()),
      categories: Object.keys(grouped).map(nom => ({ nom, items: grouped[nom] })),
    },
    plats_valides: platsValides,
    inventaire: {
      derniere_maj: new Date().toISOString(),
      produits: produitsInv,
    },
  };
}

// Fusionne un document importé dans state.data. Renvoie un résumé des éléments traités.
function applyImportJSON(doc) {
  const summary = { plats: 0, jours: 0, courses: 0, inventaire: 0 };
  if (!doc || typeof doc !== 'object') throw new Error('JSON invalide');

  // --- plats_valides -> menuBank (fusion par nom) ---
  if (Array.isArray(doc.plats_valides)) {
    doc.plats_valides.forEach(p => {
      const nom = (p.nom || p.name || '').trim();
      if (!nom) return;
      const ingTxt = Array.isArray(p.ingredients)
        ? p.ingredients.map(i => {
            if (typeof i === 'string') return i;
            const q = i.quantite != null ? ` (${i.quantite}${i.unite ? ' ' + i.unite : ''})` : '';
            return (i.nom || '') + q;
          }).filter(Boolean).join(', ')
        : (typeof p.ingredients === 'string' ? p.ingredients : '');
      const existing = state.data.menuBank.find(d => d.name === nom);
      if (existing) {
        if (p.categorie) existing.category = p.categorie;
        if (p.cout_personne != null) existing.costPerPerson = p.cout_personne;
        if (p.temps_prep != null) existing.prepTime = p.temps_prep;
        if (ingTxt) existing.ingredients = ingTxt;
        if (Array.isArray(p.tags)) existing.tags = p.tags;
      } else {
        state.data.menuBank.push({
          id: uid(), name: nom,
          category: p.categorie || 'Autre',
          season: 'Toutes',
          costPerPerson: p.cout_personne || 0,
          prepTime: p.temps_prep || 0,
          rating: 4,
          ingredients: ingTxt,
          tags: Array.isArray(p.tags) ? p.tags : [],
        });
      }
      summary.plats++;
    });
  }

  // --- semaine -> weeks/days/services ---
  if (doc.semaine && Array.isArray(doc.semaine.jours)) {
    doc.semaine.jours.forEach(j => {
      if (!j.date) return;
      const monday = mondayOf(j.date);
      if (!monday) return;
      const weekKey = fmtDate(monday);
      if (!state.data.weeks[weekKey]) {
        state.data.weeks[weekKey] = { days: {} };
        for (let i = 0; i < 7; i++) {
          const d = new Date(monday); d.setDate(d.getDate() + i);
          state.data.weeks[weekKey].days[fmtDate(d)] = {
            couverts: (state.data.settings && state.data.settings.defaultCouverts) || 1,
            services: { dejeuner: '', midi: '', gouter: '', soir: '' },
            notes: '',
          };
        }
      }
      const day = state.data.weeks[weekKey].days[j.date];
      if (!day) return;
      (j.repas || []).forEach(r => {
        const svc = MOMENT_TO_SERVICE[(r.moment || '').toLowerCase()];
        if (!svc || !r.plat) return;
        day.services[svc] = r.plat;
        if (r.personnes) day.couverts = r.personnes;
      });
      summary.jours++;
    });
  }

  // --- courses -> shoppingList ---
  if (doc.courses && Array.isArray(doc.courses.categories)) {
    doc.courses.categories.forEach(cat => {
      (cat.items || []).forEach(it => {
        const name = (it.produit || it.nom || it.name || '').trim();
        if (!name) return;
        const qty = it.quantite != null ? `${it.quantite}${it.unite ? ' ' + it.unite : ''}`.trim() : '';
        state.data.shoppingList.push({
          id: uid(), name, qty,
          estPrice: it.prix_estime || 0,
          supplier: categoryToSupplier(cat.nom),
          checked: false,
        });
        summary.courses++;
      });
    });
  }

  // --- inventaire -> inventory (fusion par nom) ---
  const invProduits = doc.inventaire && Array.isArray(doc.inventaire.produits)
    ? doc.inventaire.produits
    : (Array.isArray(doc.inventaire) ? doc.inventaire : null);
  if (invProduits) {
    invProduits.forEach(p => {
      const name = (p.nom || p.name || '').trim();
      if (!name) return;
      const fields = {
        qty: p.quantite_actuelle != null ? p.quantite_actuelle : (p.qty != null ? p.qty : 0),
        unit: p.unite || p.unit || '',
        threshold: p.seuil_alerte != null ? p.seuil_alerte : (p.threshold != null ? p.threshold : 0),
        category: p.categorie || p.category || 'Autre',
      };
      const existing = state.data.inventory.find(x => x.name === name);
      if (existing) Object.assign(existing, fields);
      else state.data.inventory.push({ id: uid(), name, ...fields });
      summary.inventaire++;
    });
  }

  return summary;
}

async function exportDataJSON() {
  try {
    const doc = buildExportJSON(state.weekOffset || 0);
    const blob = new Blob([JSON.stringify(doc, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mise-en-place-${fmtDate(new Date())}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Export JSON téléchargé ✓');
  } catch (e) {
    showToast('Erreur export : ' + (e.message || e));
  }
}

function importDataJSON() {
  const input = document.createElement('input');

  input.addEventListener('change', async () => {

    try {
      const text = await file.text();
      const doc = JSON.parse(text);
      const s = applyImportJSON(doc);
      await saveData();
      state.modal = null;
      render();
      showToast(`Importé ✓ ${s.plats} plats · ${s.jours} jours · ${s.courses} courses · ${s.inventaire} stock`);
    } catch (e) {
      showToast('Erreur import : ' + (e.message || 'JSON illisible'));
    }
  });
  input.click();
}

// Extrait un objet JSON d'une réponse IA (tolère les ```json … ``` ou le texte autour).
function parseWeekJSON(txt) {
  let s = (txt || '').trim();
  const fence = s.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if (fence) s = fence[1].trim();
  const a = s.indexOf('{'), b = s.lastIndexOf('}');
  if (a >= 0 && b > a) s = s.slice(a, b + 1);
  return JSON.parse(s);
}

async function aiGenerateWeek() {
  if (!aiAvailable()) {
    state.modal = { type: 'chat' };
    state.chatMessages = [{ role: 'assistant', content: "**Assistant IA non configuré.**\n\nVa dans Réglages → IA Claude pour coller ta clé API Anthropic." }];
    render();
    return;
  }

  showToast('Génération de la semaine en cours…');
  render();

  const bankList = state.data.menuBank.map(d => `${d.name} [${d.category}]`).join('\n');
  const sys = getContextPrompt() + `\n\nTu génères le planning d'UNE semaine (7 jours, du lundi au dimanche) avec 4 services par jour : "dejeuner" (petit-déjeuner du matin), "midi", "gouter", "soir".\nUtilise EN PRIORITÉ les plats de la banque ci-dessous, en reprenant leur nom EXACTEMENT. Tu peux proposer un nouveau plat si nécessaire.\nVarie les protéines (rotation viande / poisson / végé) et vise un budget hebdo d'environ ${state.data.settings.budgetWeekly}€.\n\nBANQUE DE PLATS:\n${bankList}\n\nRÉPONDS UNIQUEMENT avec un objet JSON valide, sans aucun texte autour, au format EXACT :\n{"jours":[{"jour":"Lundi","dejeuner":"...","midi":"...","gouter":"...","soir":"..."}, ... 7 objets, du lundi au dimanche]}`;

  const response = await callClaude(sys, 'Génère la semaine au format JSON strict décrit dans les consignes.', []);

  let parsed = null;
  try { parsed = parseWeekJSON(response); } catch (e) { parsed = null; }

  // Si le parsing échoue, on retombe sur l'ancien comportement : afficher la réponse dans le chat.
  if (!parsed || !Array.isArray(parsed.jours) || !parsed.jours.length) {
    state.modal = { type: 'chat' };
    state.chatMessages = [
      { role: 'user', content: 'Génère-moi une semaine complète de menus.' },
      { role: 'assistant', content: response },
    ];
    state.chatLoading = false;
    render();
    return;
  }

  // Écrit directement dans le calendrier de la semaine courante.
  const wk = getWeekData(0);
  const dateKeys = Object.keys(wk.days); // lundi → dimanche
  parsed.jours.slice(0, dateKeys.length).forEach((j, i) => {
    const day = wk.days[dateKeys[i]];
    if (!day) return;
    day.services.dejeuner = String(j.dejeuner || '').trim();
    day.services.midi = String(j.midi || '').trim();
    day.services.gouter = String(j.gouter || '').trim();
    day.services.soir = String(j.soir || '').trim();
  });

  await saveData();
  state.modal = null;
  state.view = 'week';
  showToast('Semaine générée ✓');
  render();
}

async function aiBuildShopping() {
  if (!aiAvailable()) {
    state.modal = { type: 'chat' };
    state.chatMessages = [{ role: 'assistant', content: "**Assistant IA non configuré.**\n\nVa dans Réglages → IA Claude pour coller ta clé API Anthropic." }];
    render();
    return;
  }

  showToast('Construction de la liste en cours…');
  render();

  const wk = getWeekData(0);
  const planSummary = Object.entries(wk.days).map(([dateKey, day]) => {
    const d = new Date(dateKey + 'T00:00:00');
    const services = Object.entries(day.services).filter(([k, v]) => v).map(([k, v]) => `${k}: ${v}`).join(', ');
    return `${fmtDay(d)}: ${services || '(vide)'}`;
  }).join('\n');

  const stockSummary = (state.data.inventory || []).map(i => `${i.name} (${i.qty}${i.unit || ''})`).join(', ') || '(vide)';

  const sys = getContextPrompt() + `\n\nPLANNING DE LA SEMAINE:\n${planSummary}\n\nSTOCK ACTUEL: ${stockSummary}\n\nListe les ingrédients nécessaires pour les plats planifiés, pour ${state.data.settings.defaultCouverts} personnes. Vérifie le stock et ne liste QUE ce qui manque. Choisis un "fournisseur" parmi : Boucher, Poissonnier, Maraîcher, Supermarché, Cave.\n\nRÉPONDS UNIQUEMENT avec un objet JSON valide, sans texte autour, au format EXACT :\n{"courses":[{"fournisseur":"Maraîcher","produit":"Carottes","quantite":"2.5 kg","prix_estime":3.5}, ...]}`;

  const response = await callClaude(sys, 'Construis ma liste de courses au format JSON strict décrit dans les consignes.', []);

  let parsed = null;
  try { parsed = parseWeekJSON(response); } catch (e) { parsed = null; }

  // Repli sur l'affichage chat si le JSON est illisible.
  if (!parsed || !Array.isArray(parsed.courses) || !parsed.courses.length) {
    state.modal = { type: 'chat' };
    state.chatMessages = [
      { role: 'user', content: 'Construis ma liste de courses depuis mon planning de cette semaine.' },
      { role: 'assistant', content: response },
    ];
    state.chatLoading = false;
    render();
    return;
  }

  // Ajout à la liste, sans doublon (par nom).
  let added = 0;
  parsed.courses.forEach(c => {
    const name = String(c.produit || c.nom || '').trim();
    if (!name) return;
    if (state.data.shoppingList.some(x => (x.name || '').toLowerCase() === name.toLowerCase())) return;
    state.data.shoppingList.push({
      id: uid(),
      name,
      qty: String(c.quantite || '').trim(),
      estPrice: parseFloat(c.prix_estime) || 0,
      supplier: categoryToSupplier(c.fournisseur || c.categorie),
      checked: false,
    });
    added++;
  });

  await saveData();
  state.modal = null;
  state.view = 'courses';
  state.coursesSubview = 'shopping';
  showToast(added ? `Liste mise à jour ✓ (+${added} article${added > 1 ? 's' : ''})` : 'Rien à ajouter (déjà en stock ou en liste)');
  render();
}

// ============================================================

// ============================================================
async function handleAction(action, el) {
  switch(action) {
    case 'pin-unlock': {
      const input = document.getElementById('pin-input');
      const pin = (input && input.value) || state.pinDraft || '';
      if (!pin || pin.length < 4) { state.pinError = 'Au moins 4 chiffres'; render(); return; }
      const ok = await verifyPin(pin);
      if (ok) {
        state.locked = false;
        state.pinDraft = '';
        state.pinError = '';
        await loadData();
        await loadMessages();
        await loadMembers();
        await loadAllDms();
        if (!state.profile) {
          state.modal = { type: 'profile-setup' };
        } else {
          try { await publishMember(); } catch (e) {}
        }
        render();
      } else {
        state.pinError = 'Code incorrect';
        state.pinDraft = '';
        render();
      }
      break;
    }
    case 'pin-change': {
      state.pinHashCached = await getPinHash();
      state.modal = { type: 'pin-form' };
      render();
      break;
    }
    case 'pin-set': {
      const oldInput = document.getElementById('pin-old');
      const newInput = document.getElementById('pin-new');
      const confInput = document.getElementById('pin-confirm');
      const newPin = newInput ? newInput.value.trim() : '';
      const confPin = confInput ? confInput.value.trim() : '';
      const existingHash = await getPinHash();
      if (existingHash) {
        const oldPin = oldInput ? oldInput.value.trim() : '';
        if (!oldPin || !(await verifyPin(oldPin))) { showToast('Ancien code incorrect'); return; }
      }
      if (newPin.length < 4) { showToast('Min. 4 chiffres'); return; }
      if (newPin !== confPin) { showToast('Les codes ne correspondent pas'); return; }
      try {
        await setPin(newPin);
        state.pinHashCached = await getPinHash();
        showToast(existingHash ? 'Code modifié' : 'Code activé');
        state.modal = { type: 'settings' };
        render();
      } catch (e) {
        showToast('Erreur : ' + e.message);
      }
      break;
    }
    case 'pin-remove': {
      if (confirm('Désactiver le code d\'accès ?')) {
        await clearPin();
        state.pinHashCached = null;
        showToast('Code désactivé');
        state.modal = { type: 'settings' };
        render();
      }
      break;
    }
    case 'lock-now': lockApp(); break;
    case 'retry-firebase': {
      showToast('Reconnexion…');
      await testFirebase();
      if (firebaseReachable) {
        showToast('✓ Connecté');
        // Re-sync data + messages depuis Firebase
        await loadData();
        await loadMessages();
        updateTitleBadge();
      } else {
        showToast('⚠ Toujours hors-ligne');
      }
      render();
      break;
    }

    case 'nav': {
      state.view = el.dataset.tab;
      window.scrollTo(0, 0);
      render();
      break;
    }
    case 'settings': {
      state.pinHashCached = await getPinHash();
      state.modal = { type: 'settings' };
      render();
      break;
    }
    case 'open-chat': state.modal = { type: 'chat' }; render(); break;
    case 'open-family': {
      await loadMessages();
      await markAsRead();
      await loadMembers();
      await loadAllDms();
      // S'assure que notre carte membre est publiée
      try { await publishMember(); } catch (e) {}
      state.familySubview = 'messages';
      state.modal = { type: 'family-chat' };
      render();
      setTimeout(() => {
        const msgs = document.getElementById('fam-chat-messages');
        if (msgs) msgs.scrollTop = msgs.scrollHeight;
        const i = document.getElementById('fam-chat-input');
        if (i) i.focus();
      }, 100);
      break;
    }
    case 'close-modal': {
      if (state.modal && state.modal.type === 'family-chat') {
        await markAsRead();
      }
      state.modal = null;
      render();
      break;
    }
    case 'save-profile': {
      const name = document.getElementById('prof-name').value.trim();
      if (!name) { showToast('Prénom requis'); return; }
      const prev = state.profile || {};
      state.profile = {
        name,
        role: document.getElementById('prof-role').value,
        color: prev.color || colorForMember(getDeviceId()),
        lastSeenMessageAt: prev.lastSeenMessageAt || Date.now(),
        joinedAt: prev.joinedAt || Date.now(),

      };
      await saveProfile();
      await loadMembers();

      render();
      showToast(`Bienvenue ${name} !`);
      break;
    }
    case 'edit-profile': {
      state.modal = { type: 'profile-setup' };

      break;
    }

    case 'edit-service': {
      state.modal = { type: 'service-picker', service: el.dataset.service, date: el.dataset.date };
      render();
      break;
    }
    case 'select-dish': {
      const wk = getWeekData(state.weekOffset);

      state.modal = null;
      render();
      break;
    }

    case 'week-prev': state.weekOffset--; render(); break;
    case 'week-next': state.weekOffset++; render(); break;

    case 'filter': state.filterCategory = el.dataset.cat; render(); break;

    case 'add-dish': state.modal = { type: 'dish-form', dish: null }; render(); break;

      break;
    }
    case 'save-dish': {

      const newDish = {
        id: el.dataset.id || uid(),
        name,
        category: document.getElementById('dish-cat').value || 'Autre',

      state.modal = null;
      render();

      if (confirm('Supprimer ce plat de la banque ?')) {

        await saveData();
        state.modal = null;
        render();
        showToast('Plat supprimé');
      }

    case 'qty-inc': {
      const i = state.data.inventory.find(x => x.id === el.dataset.id);

      await saveData(); render();
      break;
    }
    case 'qty-dec': {
      const i = state.data.inventory.find(x => x.id === el.dataset.id);
      i.qty = Math.max(0, Math.round((i.qty - (i.qty <= 5 ? 0.5 : 1)) * 10) / 10);

    }
    case 'add-stock': state.modal = { type: 'stock-add' }; render(); break;

      const name = document.getElementById('stock-name').value.trim();

        id: uid(),

      const i = state.data.shoppingList.find(x => x.id === el.dataset.id);
