<style>
  :root {
    --paper: #F7F1E5;
    --paper-2: #F1E9D6;
    --surface: #FFFEFA;
    --ink: #1A1611;
    --ink-2: #2D2620;
    --muted: #847565;
    --muted-2: #B5A892;
    --border: #E5DBC5;
    --border-2: #D8CCB1;
    --terracotta: #B95C2C;
    --terracotta-dark: #8E4220;
    --sage: #5C7050;
    --sage-dark: #44563B;
    --amber: #D49645;
    --rose: #A03B2E;
    --gold: #C89A3F;
    --shadow-sm: 0 1px 2px rgba(26,22,17,.06);
    --shadow: 0 4px 16px rgba(26,22,17,.08);
    --shadow-lg: 0 12px 40px rgba(26,22,17,.15);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(185,92,44,.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(92,112,80,.04) 0%, transparent 50%);
  }
  .serif { font-family: 'Newsreader', serif; font-feature-settings: "lnum"; }
  .num { font-variant-numeric: tabular-nums; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  #app {
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--paper);
    position: relative;
    padding-bottom: 88px;
  }

  /* --- HEADER --- */
  header.topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(247,241,229,.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .brand-mark {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 20px;
    color: var(--terracotta);
    letter-spacing: -0.01em;
  }
  .brand-sub {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    font-weight: 500;
  }
  .icon-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
    transition: background .15s;
  }
  .icon-btn:hover, .icon-btn:active { background: var(--paper-2); }
  .icon-btn svg { width: 22px; height: 22px; }

  /* --- BOTTOM NAV --- */
  nav.bottomnav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: rgba(255,254,250,.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    max-width: 480px; margin: 0 auto;
  }
  .navtab {
    padding: 8px 4px 6px;
    border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: all .15s;
  }
  .navtab svg { width: 22px; height: 22px; }
  .navtab.active { color: var(--terracotta); }
  .navtab.active .navtab-pill {
    background: var(--terracotta);
    color: white;
  }
  .navtab-pill {
    width: 42px; height: 30px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }

  /* --- VIEWS --- */
  main { padding: 20px 18px 24px; }

  /* --- COMMON --- */
  h1.page-title {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 32px;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 8px 0 4px;
    color: var(--ink);
  }
  h1.page-title em {
    font-style: italic;
    color: var(--terracotta);
    font-weight: 500;
  }
  .page-sub {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 22px;
    font-weight: 500;
  }
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    font-weight: 600;
    margin: 26px 0 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1; height: 1px;
    background: var(--border);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow-sm);
  }
  .card-padded { padding: 16px; }

  /* --- BUDGET BAR --- */
  .budget-card {
    background: linear-gradient(135deg, var(--ink) 0%, var(--ink-2) 100%);
    color: var(--paper);
    border-radius: 22px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .budget-card::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(185,92,44,.3) 0%, transparent 70%);
  }
  .budget-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(247,241,229,.6);
    font-weight: 500;
  }
  .budget-amount {
    font-family: 'Newsreader', serif;
    font-size: 36px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-top: 4px;
    line-height: 1;
  }
  .budget-amount .small { font-size: 18px; color: var(--muted-2); margin-left: 2px; }
  .budget-bar {
    margin-top: 14px;
    height: 6px;
    background: rgba(247,241,229,.15);
    border-radius: 3px;
    overflow: hidden;
  }
  .budget-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage) 0%, var(--gold) 70%, var(--terracotta) 100%);
    border-radius: 3px;
    transition: width .4s;
  }
  .budget-meta {
    display: flex; justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: rgba(247,241,229,.7);
  }

  /* --- SERVICE CARDS (Today view) --- */
  .service-grid {
    display: grid; gap: 10px;
    grid-template-columns: 1fr 1fr;
  }
  .service-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    min-height: 110px;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: all .15s;
    position: relative;
    overflow: hidden;
  }
  .service-card:active { transform: scale(0.98); }
  .service-card .service-name {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    font-weight: 600;
  }
  .service-card .dish {
    font-family: 'Newsreader', serif;
    font-size: 17px;
    font-weight: 500;
    line-height: 1.2;
    margin: 8px 0;
    color: var(--ink);
  }
  .service-card .dish.empty {
    color: var(--muted-2);
    font-style: italic;
    font-weight: 400;
  }
  .service-card .cost {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .service-card.dejeuner::before {
    content: ''; position: absolute; top: 0; left: 0; height: 3px; width: 30%;
    background: var(--gold);
  }
  .service-card.midi::before {
    content: ''; position: absolute; top: 0; left: 0; height: 3px; width: 30%;
    background: var(--terracotta);
  }
  .service-card.gouter::before {
    content: ''; position: absolute; top: 0; left: 0; height: 3px; width: 30%;
    background: var(--amber);
  }
  .service-card.soir::before {
    content: ''; position: absolute; top: 0; left: 0; height: 3px; width: 30%;
    background: var(--sage);
  }

  /* --- AI CARD --- */
  .ai-card {
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-dark) 100%);
    color: white;
    border-radius: 18px;
    padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .ai-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 90% 50%, rgba(255,255,255,.15) 0%, transparent 50%);
    pointer-events: none;
  }
  .ai-card .ai-icon {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(255,255,255,.18);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ai-card .ai-icon svg { width: 22px; height: 22px; }
  .ai-card .ai-text { flex: 1; }
  .ai-card .ai-title {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.2;
  }
  .ai-card .ai-sub {
    font-size: 11px;
    opacity: 0.85;
    margin-top: 2px;
  }

  /* --- BUTTONS --- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px 18px;
    border-radius: 12px;
    font-weight: 500;
    font-size: 14px;
    transition: all .15s;
    letter-spacing: 0.01em;
  }
  .btn-primary {
    background: var(--terracotta);
    color: white;
  }
  .btn-primary:active { background: var(--terracotta-dark); }
  .btn-secondary {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--border-2);
  }
  .btn-secondary:active { background: var(--paper-2); }
  .btn-ghost {
    color: var(--terracotta);
    padding: 8px 12px;
  }
  .btn-full { width: 100%; }
  .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 9px; }
  .btn svg { width: 16px; height: 16px; }

  /* --- WEEK GRID --- */
  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .week-label {
    font-family: 'Newsreader', serif;
    font-size: 15px;
    font-weight: 500;
    text-align: center;
    flex: 1;
  }
  .week-label .week-num {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    display: block;
  }
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .day-header {
    padding: 12px 14px;
    background: var(--paper-2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .day-header.today {
    background: var(--ink);
    color: var(--paper);
  }
  .day-name {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 16px;
  }
  .day-name .day-date {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-left: 8px;
    font-family: 'Geist', sans-serif;
  }
  .day-header.today .day-date { color: var(--muted-2); }
  .day-total {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .day-services {
    padding: 4px 0;
  }
  .day-service-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .day-service-row:last-child { border-bottom: none; }
  .service-badge {

<script>
function setStep(txt) {
  var s = document.getElementById('loading-step');
  if (s) s.textContent = 'Étape : ' + txt;
}
function showErr(msg) {
  var box = document.getElementById('err-display');
  var m = document.getElementById('err-msg');
  if (box && m) {
    m.textContent = msg;
    box.style.display = 'block';
  }
}
setTimeout(function() {

  if (h) h.style.display = 'block';

<script>
// ============================================================
// PERSISTENCE — Firebase RTDB (shared) + localStorage (per-device)
// ============================================================
// Stratégie :
//   - 'profile:*'        → localStorage (per-device, pas de sync nécessaire)
//   - tout le reste      → Firebase Realtime Database (sync famille)
//
// L'API publique reste storageGet / storagePut / storageDelete pour ne pas
// avoir à toucher le code applicatif.

const DB_URL = 'https://mise-en-place-89ce9-default-rtdb.europe-west1.firebasedatabase.app';

let firebaseReachable = true;     // Mis à jour par testFirebase() au démarrage
let firebaseLastError = null;

function isLocalOnlyKey(key) {
  return key.startsWith('profile:');
}

function keyToFirebasePath(key) {
  // 'security:pinHash' → 'security/pinHash'
  // 'data' → 'data'
  return key.replace(/:/g, '/');
}

// --- Firebase REST helpers ---
async function fbGet(path) {
  const res = await fetch(DB_URL + '/' + path + '.json', { cache: 'no-store' });
  if (!res.ok) throw new Error('Firebase GET ' + path + ' → HTTP ' + res.status);
  const text = await res.text();
  if (text === 'null' || text === '') return null;
  try { return JSON.parse(text); } catch (e) { return text; }
}

async function fbPut(path, value) {
  const res = await fetch(DB_URL + '/' + path + '.json', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(value),
  });
  if (!res.ok) {
    const t = await res.text().catch(() => '');
    throw new Error('Firebase PUT ' + path + ' → HTTP ' + res.status + (t ? ' — ' + t.slice(0, 120) : ''));
  }
  return value;
}

async function fbDelete(path) {
  const res = await fetch(DB_URL + '/' + path + '.json', { method: 'DELETE' });
  if (!res.ok) throw new Error('Firebase DELETE ' + path + ' → HTTP ' + res.status);
  return true;
}

// Test rapide de connectivité Firebase au démarrage
async function testFirebase() {
  try {
    await fbGet('connectivity-check');
    firebaseReachable = true;
    firebaseLastError = null;
    return true;
  } catch (e) {
    firebaseReachable = false;
    firebaseLastError = e.message || String(e);
    console.warn('Firebase unreachable:', firebaseLastError);
    return false;
  }
}

// --- localStorage helpers (per-device) ---
function localGet(key) {
  try {
    const raw = localStorage.getItem('chef:' + key);
    if (raw == null) return null;
    try { return JSON.parse(raw); } catch (e) { return raw; }
  } catch (e) { return null; }
}
function localPut(key, value) {
  try {
    localStorage.setItem('chef:' + key, typeof value === 'string' ? value : JSON.stringify(value));
    return value;
  } catch (e) { throw e; }
}
function localDel(key) {
  try { localStorage.removeItem('chef:' + key); return true; } catch (e) { return false; }
}

// --- Public API ---
async function storageGet(key) {
  if (isLocalOnlyKey(key)) return localGet(key);
  try {
    return await fbGet(keyToFirebasePath(key));
  } catch (e) {
    firebaseReachable = false;
    firebaseLastError = e.message || String(e);
    return null;
  }
}

async function storagePut(key, value) {
  if (isLocalOnlyKey(key)) return localPut(key, value);
  try {
    const result = await fbPut(keyToFirebasePath(key), value);
    firebaseReachable = true;
    return result;
  } catch (e) {
    firebaseReachable = false;
    firebaseLastError = e.message || String(e);
    throw e;
  }
}

async function storageDelete(key) {
  if (isLocalOnlyKey(key)) return localDel(key);
  try {
    return await fbDelete(keyToFirebasePath(key));
  } catch (e) {
    firebaseReachable = false;
    firebaseLastError = e.message || String(e);
    return false;
  }
}

// ============================================================
// PIN GATE + AES-GCM ENCRYPTION
// ============================================================
// PBKDF2(PIN, salt, 200k iter, SHA-256) → AES-256-GCM key
// Data and messages chiffrés AVANT stockage local.
// Profile reste en clair (per-device, lisible sans PIN).

const PIN_HASH_PATH = 'security:pinHash';     // Firebase: /security/pinHash
const PIN_SALT_PATH = 'security:pinSalt';     // Firebase: /security/pinSalt
const PIN_SESSION_KEY = 'chef:pinsession:v1'; // LOCAL device (localStorage)
const PIN_RAWKEY_KEY = 'chef:sessionkey:v1';  // LOCAL device (AES key cache)

async function sha256(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function hexToBytes(hex) {
  const out = new Uint8Array(hex.length / 2);
  for (let i = 0; i < out.length; i++) out[i] = parseInt(hex.substr(i * 2, 2), 16);
  return out;
}
function bytesToHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}
function bytesToB64(bytes) {
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function b64ToBytes(b64) {
  const s = atob(b64);
  const out = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) out[i] = s.charCodeAt(i);
  return out;
}

async function getOrCreateSalt() {
  try {
    const existing = await storageGet(PIN_SALT_PATH);
    if (existing) return existing;
  } catch (e) {}
  const buf = crypto.getRandomValues(new Uint8Array(16));
  const hex = bytesToHex(buf);
  try { await storagePut(PIN_SALT_PATH, hex); } catch (e) { console.warn('Salt save failed:', e); }
  return hex;
}

async function deriveKey(pin, saltHex) {
  const enc = new TextEncoder();
  const salt = hexToBytes(saltHex);
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    true,
    ['encrypt', 'decrypt']
  );
}

async function encryptString(plain, key) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = new TextEncoder().encode(plain);
  const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);
  return 'enc1:' + bytesToB64(iv) + ':' + bytesToB64(new Uint8Array(cipher));
}

async function decryptString(payload, key) {
  if (typeof payload !== 'string' || !payload.startsWith('enc1:')) return payload;
  const parts = payload.slice(5).split(':');
  if (parts.length !== 2) throw new Error('Format chiffré invalide');
  const iv = b64ToBytes(parts[0]);
  const cipher = b64ToBytes(parts[1]);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipher);
  return new TextDecoder().decode(plain);
}

async function cacheCryptoKey(key) {
  try {
    const raw = await crypto.subtle.exportKey('raw', key);
    localStorage.setItem(PIN_RAWKEY_KEY, bytesToB64(new Uint8Array(raw)));
  } catch (e) { console.warn('Key cache failed:', e); }
}
async function loadCachedCryptoKey() {
  try {
    const b64 = localStorage.getItem(PIN_RAWKEY_KEY);
    if (!b64) return null;
    const raw = b64ToBytes(b64);
    return await crypto.subtle.importKey('raw', raw, { name: 'AES-GCM' }, true, ['encrypt', 'decrypt']);
  } catch (e) { return null; }
}
function clearCachedCryptoKey() {
  try { localStorage.removeItem(PIN_RAWKEY_KEY); } catch (e) {}
  try { localStorage.removeItem(PIN_SESSION_KEY); } catch (e) {}
}

async function getPinHash() {
  try {
    return await storageGet(PIN_HASH_PATH);
  } catch (e) { return null; }
}

async function setPin(newPin) {
  if (newPin.length < 4) throw new Error('PIN trop court');
  // Snapshot decrypted data NOW (before key swap)
  const dataNow = state.data;
  const messagesNow = state.messages;

  const salt = await getOrCreateSalt();
  const newKey = await deriveKey(newPin, salt);
  state.cryptoKey = newKey;

  const hash = await sha256('chef-app-salt-v1::' + newPin);
  await storagePut(PIN_HASH_PATH, hash);
  await cacheCryptoKey(newKey);
  try { localStorage.setItem(PIN_SESSION_KEY, hash); } catch (e) {}

  // Re-encrypt data with new key
  if (dataNow) {
    await storagePutEncrypted('data', JSON.stringify(dataNow));
  }
  if (messagesNow && messagesNow.length > 0) {
    // Stockage en un seul blob (toute la liste chiffrée d'un coup)
    await storagePutEncrypted('messages', JSON.stringify(messagesNow));
  }
}

async function clearPin() {
  const dataNow = state.data;
  const messagesNow = state.messages;
  state.cryptoKey = null;

  // Re-save in plain text
  if (dataNow) {
    try { await storagePut('data', dataNow); } catch (e) {}
  }
  if (messagesNow && messagesNow.length > 0) {
    try { await storagePut('messages', messagesNow); } catch (e) {}
  }

  try { await storageDelete(PIN_HASH_PATH); } catch (e) {}
  try { await storageDelete(PIN_SALT_PATH); } catch (e) {}
  clearCachedCryptoKey();
}

async function verifyPin(pin) {
  const stored = await getPinHash();
  if (!stored) return true;
  const hash = await sha256('chef-app-salt-v1::' + pin);
  if (hash !== stored) return false;
  try {
    const salt = await getOrCreateSalt();
    const key = await deriveKey(pin, salt);
    state.cryptoKey = key;
    await cacheCryptoKey(key);
    try { localStorage.setItem(PIN_SESSION_KEY, hash); } catch (e) {}
    return true;
  } catch (e) {
    console.error('Key derivation failed:', e);
    return false;
  }
}

async function isUnlocked() {
  const stored = await getPinHash();
  if (!stored) return true;
  try {
    const session = localStorage.getItem(PIN_SESSION_KEY);
    if (session !== stored) return false;
  } catch (e) { return false; }
  const key = await loadCachedCryptoKey();
  if (!key) return false;
  state.cryptoKey = key;
  return true;
}

function lockApp() {
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
  saveQueued = false;

  state.cryptoKey = null;
  state.data = defaultData();
  state.messages = [];
  state.unreadCount = 0;
  // Vide aussi les DM en mémoire (déchiffrables uniquement avec la clé)
  state.dms = {};
  state.unreadDms = {};
  state.activeDmId = null;
  state.dmDraft = '';
  clearCachedCryptoKey();
  state.locked = true;
  state.modal = null;
  render();
}

// Encrypted wrappers around storageGet/storagePut (used when state.cryptoKey is set)
async function storageGetMaybeDecrypted(key) {
  const val = await storageGet(key);
  if (val == null) return val;
  if (state.cryptoKey && typeof val === 'string' && val.startsWith('enc1:')) {
    try {
      const plain = await decryptString(val, state.cryptoKey);
      return JSON.parse(plain);
    } catch (e) {
      console.error('Decryption failed for', key, e);
      throw new Error('Déchiffrement impossible (PIN incorrect ?)');
    }
  }
  // If value is encrypted but we have no key, return a sentinel
  if (typeof val === 'string' && val.startsWith('enc1:')) return '__encrypted__';
  return val;
}

async function storagePutEncrypted(key, jsonString) {
  if (state.cryptoKey) {
    const cipher = await encryptString(jsonString, state.cryptoKey);
    return storagePut(key, cipher);
  }
  // No key → store the parsed value (plain JSON object/array/string)
  return storagePut(key, JSON.parse(jsonString));
}

  view: 'today',
  data: null,
  modal: null,
  toast: null,
  filterCategory: 'Tous',
  searchTerm: '',
  weekOffset: 0,
  chatMessages: [],
  chatLoading: false,
  coursesSubview: 'shopping',
  ticketGroupBy: 'date',

  profile: null,
  messages: [],
  messageDraft: '',
  unreadCount: 0,
  familySubview: 'messages',
  // Multi-utilisateur (connexion entre utilisateurs)
  members: [],          // [{ id, name, role, color, lastSeenAt, joinedAt }]
  activeDmId: null,     // id du membre avec qui on chatte en privé
  dms: {},              // { chatId: [messages] }
  dmDraft: '',
  unreadDms: {},        // { memberId: count }
  // Receipt scanning state
  scanning: false,

  viewerImage: null,
  reportMonthOffset: 0,
  // PIN gate state

  pinDraft: '',
  pinError: '',
  pinHashCached: null,
  cryptoKey: null,
  // Invitation
  inviteUrl: '',
  pendingInvitePin: '',
};
window.state = state;

let saveTimer = null;
let saveQueued = false;
let deviceId = null;

function getDeviceId() {
  if (deviceId) return deviceId;
  try {
    let id = localStorage.getItem('chef:deviceId');
    if (!id) {
      id = uid() + uid() + uid();
      localStorage.setItem('chef:deviceId', id);
    }
    deviceId = id;
  } catch (e) {
    deviceId = 'session-' + uid() + uid();
  }
  return deviceId;
}

function normalizeData() {
  const def = defaultData();
  for (const k of Object.keys(def)) {
    if (state.data[k] === undefined) state.data[k] = def[k];
  }
  // Coerce object → array (défensif, pour compat avec anciennes données)
  if (!Array.isArray(state.data.menuBank)) state.data.menuBank = state.data.menuBank ? Object.values(state.data.menuBank) : [];
  if (!Array.isArray(state.data.inventory)) state.data.inventory = state.data.inventory ? Object.values(state.data.inventory) : [];
  if (!Array.isArray(state.data.shoppingList)) state.data.shoppingList = state.data.shoppingList ? Object.values(state.data.shoppingList) : [];
  if (!Array.isArray(state.data.receipts)) state.data.receipts = state.data.receipts ? Object.values(state.data.receipts) : [];
  if (!Array.isArray(state.data.events)) state.data.events = state.data.events ? Object.values(state.data.events) : [];
  if (!Array.isArray(state.data.suppliers)) state.data.suppliers = state.data.suppliers ? Object.values(state.data.suppliers) : [];
}

async function loadData() {
  try {
    const val = await storageGetMaybeDecrypted('data');
    if (val === '__encrypted__') {
      // Locked — caller should redirect to PIN gate
      state.data = defaultData();
      return;
    }
    if (val) {
      state.data = val;
      normalizeData();
      return;
    }
  } catch (e) {
    console.error('loadData failed:', e);
  }
  if (!state.data) state.data = defaultData();
  try { await doSaveData(); } catch (e) { /* ignore */ }
}

async function saveData() {
  saveQueued = true;
  if (saveTimer) return;
  saveTimer = setTimeout(async () => {
    while (saveQueued) {
      saveQueued = false;
      await doSaveData();
    }
    saveTimer = null;
  }, 250);
}

// Arrays in state.data qui ont besoin d'un merge concurrent (deux devices peuvent
// ajouter des items en même temps sans s'écraser).
const COLLECTION_KEYS = ['receipts', 'shoppingList', 'inventory', 'menuBank', 'events', 'suppliers'];

function mergeArrayById(remote, local) {
  remote = Array.isArray(remote) ? remote : [];
  local = Array.isArray(local) ? local : [];
  const map = new Map();
  // Remote d'abord, puis local écrase (local wins pour les items déjà vus)
  for (const item of remote) { if (item && item.id) map.set(item.id, item); }
  for (const item of local)  { if (item && item.id) map.set(item.id, item); }
  return Array.from(map.values());
}

async function doSaveData() {
  if (state.locked) return;  // jamais sauvegarder l'état vide pendant verrouillage
  try {
    // MERGE-ON-WRITE : récupère la version remote, merge avec notre local,
    // puis sauve. Sinon un autre device qui a ajouté un ticket entre-temps
    // verrait son ticket disparaître quand on save par-dessus.
    let remote = null;
    try {
      const fresh = await storageGetMaybeDecrypted('data');
      if (fresh && fresh !== '__encrypted__' && typeof fresh === 'object') remote = fresh;
    } catch (e) { /* utilise local seul si lecture échoue */ }

    if (remote) {
      for (const k of COLLECTION_KEYS) {
        state.data[k] = mergeArrayById(remote[k], state.data[k]);
      }
      // weeks : merge par semaine, local wins pour les semaines qu'on touche
      if (remote.weeks && typeof remote.weeks === 'object') {
        const merged = { ...remote.weeks };
        for (const k of Object.keys(state.data.weeks || {})) {
          merged[k] = state.data.weeks[k]; // local wins per week
        }
        state.data.weeks = merged;
      }
    }

    await storagePutEncrypted('data', JSON.stringify(state.data));
  } catch (e) {
    console.error('saveData failed:', e);
    showToast('⚠ Sauvegarde échouée — Firebase indisponible');
  }
}

async function loadProfile() {
  const id = getDeviceId();
  try {
    // Profile reste en clair (per-device, pas besoin de PIN pour son propre device)
    const val = await storageGet('profile:' + id);
    state.profile = val || null;
  } catch (e) {
    state.profile = null;
  }
}

async function saveProfile() {
  if (!state.profile) return;
  const id = getDeviceId();
  try {
    await storagePut('profile:' + id, state.profile);
  } catch (e) { console.error('Profile save failed:', e); }
  // Publie aussi la carte membre côté Firebase (sans données sensibles)
  try { await publishMember(); } catch (e) {}
}

async function loadMessages() {
  try {
    const val = await storageGetMaybeDecrypted('messages');
    if (val === '__encrypted__') {
      // Locked — keep current state
      state.messages = state.messages || [];
      computeUnread();
      return;
    }
    if (!val) { state.messages = []; computeUnread(); return; }
    // val should be an array; accept legacy dict shape too
    const arr = Array.isArray(val) ? val : (typeof val === 'object' ? Object.values(val) : []);
    state.messages = arr
      .filter(m => m && typeof m === 'object')
      .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    computeUnread();
  } catch (e) {
    console.error('loadMessages failed:', e);
    state.messages = state.messages || [];
  }
}

function computeUnread() {
  const last = state.profile && state.profile.lastSeenMessageAt ? state.profile.lastSeenMessageAt : 0;
  const myName = state.profile ? state.profile.name : '';
  state.unreadCount = state.messages.filter(m => m.author !== myName && m.timestamp > last).length;
}

async function sendMessage(content) {
  if (!state.profile) return;
  const msg = {
    id: uid(),
    author: state.profile.name,
    role: state.profile.role || 'Famille',
    content,
    timestamp: Date.now(),
  };
  try {
    // MERGE-ON-WRITE : récupère la liste actuelle de Firebase (peut contenir des
    // messages d'autres devices envoyés entre-temps), ajoute le nôtre, puis sauve.
    // Sinon deux devices qui envoient simultanément écraseraient l'un l'autre.
    let remote = [];
    try {
      const fresh = await storageGetMaybeDecrypted('messages');
      if (Array.isArray(fresh)) remote = fresh;
      else if (fresh && typeof fresh === 'object' && fresh !== '__encrypted__') remote = Object.values(fresh);
    } catch (e) { /* utilise état local si lecture échoue */ }

    const seen = new Set(remote.map(m => m && m.id));
    const merged = remote.slice();
    if (!seen.has(msg.id)) merged.push(msg);
    merged.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

    await storagePutEncrypted('messages', JSON.stringify(merged));
    state.messages = merged;
    computeUnread();
    render();
  } catch (e) {
    console.error('sendMessage failed:', e);
    state.messages = state.messages || [];
    state.messages.push(msg); // affiche au moins localement
    render();
    showToast('⚠ Message non envoyé — réessaie quand la connexion revient');
  }
}

async function markAsRead() {
  if (!state.profile) return;
  state.profile.lastSeenMessageAt = Date.now();
  await saveProfile();
  state.unreadCount = 0;
}

// ============================================================
// MEMBRES, PRÉSENCE, DM (connexion entre utilisateurs)
// ============================================================
// Chaque device qui crée un profil publie une "carte de membre" sur Firebase
// sous /members/{deviceId}. Le profil reste aussi en LOCAL pour soi-même (pas
// besoin de PIN pour s'identifier sur son device).
// Un heartbeat met à jour lastSeenAt toutes les 30s pour montrer la présence.
// Les DM sont stockés sous /dms/{chatId} où chatId = sort(idA, idB).

const MEMBER_COLORS = ['#B95C2C', '#5C7050', '#D49645', '#A03B2E', '#C89A3F', '#3D5A6C', '#8B5A8C', '#4A7C7E'];
function colorForMember(id) {
  let h = 0;
  const s = String(id || '');
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) & 0x7fffffff;
  return MEMBER_COLORS[h % MEMBER_COLORS.length];
}
function initialsOf(name) {
  if (!name) return '?';
  const parts = String(name).trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function presenceState(ts) {
  if (!ts) return 'offline';
  const diff = Date.now() - ts;
  if (diff < 90 * 1000) return 'online';          // < 1m30
  if (diff < 10 * 60 * 1000) return 'recent';      // < 10 min
  return 'offline';
}
function presenceLabel(ts) {
  if (!ts) return 'Jamais vu';
  const diff = Date.now() - ts;
  if (diff < 90 * 1000) return 'En ligne';
  if (diff < 60 * 60 * 1000) return 'Il y a ' + Math.max(1, Math.floor(diff / 60000)) + ' min';
  if (diff < 24 * 60 * 60 * 1000) return 'Il y a ' + Math.floor(diff / 3600000) + ' h';
  const d = new Date(ts);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
}

async function publishMember() {
  if (!state.profile || !state.profile.name) return;
  const id = getDeviceId();
  const card = {
    id,
    name: state.profile.name,
    role: state.profile.role || 'Famille',
    color: state.profile.color || colorForMember(id),
    lastSeenAt: Date.now(),
    joinedAt: state.profile.joinedAt || Date.now(),
  };
  if (!state.profile.joinedAt) {
    state.profile.joinedAt = card.joinedAt;
    try { await saveProfile(); } catch (e) {}
  }
  try {
    // members ne sont PAS chiffrés (on a besoin de voir qui est dans la famille
    // même quand l'app est verrouillée pour identifier les expéditeurs).
    await storagePut('members:' + id, card);
  } catch (e) { console.warn('publishMember failed:', e); }
}

async function loadMembers() {
  try {
    const val = await storageGet('members');
    if (!val || typeof val !== 'object') { state.members = []; return; }
    state.members = Object.values(val)
      .filter(m => m && m.id && m.name)
      .sort((a, b) => (a.name || '').localeCompare(b.name || '', 'fr'));
  } catch (e) {
    console.error('loadMembers failed:', e);
    state.members = state.members || [];
  }
}

// Heartbeat — met à jour lastSeenAt régulièrement
let heartbeatHandle = null;
function startHeartbeat() {
  if (heartbeatHandle) return;
  const tick = async () => {
    if (state.locked || !state.profile) return;
    try { await publishMember(); } catch (e) {}
  };
  // tick immédiat puis toutes les 30 s
  tick();
  heartbeatHandle = setInterval(tick, 30 * 1000);
}

function getMyMemberId() { return getDeviceId(); }
function findMember(id) { return state.members.find(m => m.id === id); }

// --- Direct Messages ---
function dmChatId(idA, idB) {
  const [a, b] = [String(idA), String(idB)].sort();
  return a + '__' + b;
}

async function loadDmThread(otherId) {
  if (!otherId) return [];
  const id = dmChatId(getMyMemberId(), otherId);
  try {
    const val = await storageGetMaybeDecrypted('dms:' + id);
    if (val === '__encrypted__') return state.dms[id] || [];
    if (!val) { state.dms[id] = []; return []; }
    const arr = Array.isArray(val) ? val : (typeof val === 'object' ? Object.values(val) : []);
    const list = arr
      .filter(m => m && typeof m === 'object')
      .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    state.dms[id] = list;
    return list;
  } catch (e) {
    console.error('loadDmThread failed:', e);
    return state.dms[id] || [];
  }
}

async function loadAllDms() {
  // Récupère tous les DM dont je fais partie pour calculer les badges non-lus.
  // Chaque thread est chiffré individuellement sous /dms/{chatId} = enc1:...
  // Donc on lit le parent (objet d'enregistrements chiffrés) puis on déchiffre
  // ceux qui me concernent.
  try {
    const myId = getMyMemberId();
    let parent;
    try { parent = await fbGet('dms'); }
    catch (e) { return; }
    if (!parent || typeof parent !== 'object') { state.unreadDms = {}; return; }
    const lastSeen = (state.profile && state.profile.dmLastSeen) || {};
    state.unreadDms = {};
    for (const [chatId, raw] of Object.entries(parent)) {
      if (!chatId.includes(myId)) continue;
      const [a, b] = chatId.split('__');
      const otherId = a === myId ? b : a;
      let arr = [];
      if (typeof raw === 'string' && raw.startsWith('enc1:')) {
        if (!state.cryptoKey) continue;  // verrouillé, on n'a pas la clé
        try {
          const plain = await decryptString(raw, state.cryptoKey);
          const parsed = JSON.parse(plain);
          arr = Array.isArray(parsed) ? parsed : (typeof parsed === 'object' ? Object.values(parsed) : []);
        } catch (e) { continue; }
      } else if (Array.isArray(raw)) {
        arr = raw;
      } else if (raw && typeof raw === 'object') {
        arr = Object.values(raw);
      }
      arr = arr.filter(m => m && typeof m === 'object').sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
      const seenTs = lastSeen[otherId] || 0;
      const unread = arr.filter(m => m && m.fromId && m.fromId !== myId && (m.timestamp || 0) > seenTs).length;
      state.dms[chatId] = arr;
      if (unread > 0) state.unreadDms[otherId] = unread;
    }
  } catch (e) { console.warn('loadAllDms failed:', e); }
}

async function sendDm(toId, content) {
  if (!state.profile || !toId || !content) return;
  const myId = getMyMemberId();
  const chatId = dmChatId(myId, toId);
  const msg = {
    id: uid(),
    fromId: myId,
    fromName: state.profile.name,
    toId,
    content,
    timestamp: Date.now(),
  };
  try {
    let remote = [];
    try {
      const fresh = await storageGetMaybeDecrypted('dms:' + chatId);
      if (Array.isArray(fresh)) remote = fresh;
      else if (fresh && typeof fresh === 'object' && fresh !== '__encrypted__') remote = Object.values(fresh);
    } catch (e) {}
    const seen = new Set(remote.map(m => m && m.id));
    const merged = remote.slice();
    if (!seen.has(msg.id)) merged.push(msg);
    merged.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    await storagePutEncrypted('dms:' + chatId, JSON.stringify(merged));
    state.dms[chatId] = merged;
  } catch (e) {
    console.error('sendDm failed:', e);
    state.dms[chatId] = state.dms[chatId] || [];
    state.dms[chatId].push(msg);
    showToast('⚠ Message non envoyé — réessaie quand la connexion revient');
  }
}

async function markDmRead(otherId) {
  if (!state.profile || !otherId) return;
  state.profile.dmLastSeen = state.profile.dmLastSeen || {};
  state.profile.dmLastSeen[otherId] = Date.now();
  await saveProfile();
  delete state.unreadDms[otherId];
}

// --- Invitation ---
async function buildInviteUrl() {
  // L'URL d'invitation contient le HASH du PIN (jamais le PIN en clair).
  // L'invité saisira son PIN à l'arrivée et on vérifiera contre le hash partagé.
  // En réalité, le hash est DÉJÀ sur Firebase (security/pinHash), donc la seule
  // chose dont l'invité a besoin c'est l'URL de l'app + le PIN, qu'on lui dit
  // verbalement. L'URL d'invitation marque juste "vous avez été invité".
  const base = location.origin + location.pathname;

}

// ============================================================
// NOTIFICATIONS (Notification API + title badge)
// ============================================================
// Marche quand l'onglet est ouvert (même en arrière-plan, écran verrouillé tant
// que le navigateur tourne). Vraies push notifications nécessitent Service Worker
// + serveur push — pas implémenté ici (PWA installée sur iOS 16.4+ requise).

const NOTIF_ENABLED_KEY = 'chef:notif:enabled:v1';   // LOCAL — préférence par device
const NOTIF_LAST_SEEN_KEY = 'chef:notif:lastseen:v1'; // LOCAL — dernier ts notifié

function notifSupported() {
  return typeof Notification !== 'undefined' && 'permission' in Notification;
}
function notifGranted() {
  return notifSupported() && Notification.permission === 'granted';
}
function notifUserEnabled() {
  if (!notifGranted()) return false;
  try { return localStorage.getItem(NOTIF_ENABLED_KEY) !== '0'; }
  catch (e) { return true; }
}
function setNotifUserEnabled(on) {
  try { localStorage.setItem(NOTIF_ENABLED_KEY, on ? '1' : '0'); } catch (e) {}
}

async function requestNotifPermission() {
  if (!notifSupported()) { showToast('Notifications non supportées'); return false; }
  if (Notification.permission === 'granted') { setNotifUserEnabled(true); return true; }
  if (Notification.permission === 'denied') {
    showToast('Notifications bloquées — débloque dans les réglages du navigateur');
    return false;
  }
  try {
    const result = await Notification.requestPermission();
    if (result === 'granted') { setNotifUserEnabled(true); showToast('Notifications activées'); return true; }
    showToast('Notifications refusées');
    return false;
  } catch (e) { console.error('Permission request failed:', e); return false; }
}

function shouldShowNotif(msg) {
  if (!notifUserEnabled()) return false;
  if (!state.profile || msg.author === state.profile.name) return false;
  const chatOpen = state.modal && state.modal.type === 'family-chat' && state.familySubview === 'messages';
  const tabActive = document.visibilityState === 'visible';
  if (chatOpen && tabActive) return false;
  return true;
}

function fireMessageNotif(msg) {
  if (!shouldShowNotif(msg)) return;
  try {
    const body = (msg.content || '').replace(/\*\*/g, '').slice(0, 140);
    const n = new Notification(msg.author + ' — Mise en place', {
      body, tag: 'mep-msg-' + msg.id, renotify: false, silent: false,
    });
    n.onclick = () => {
      try { window.focus(); } catch (e) {}
      n.close();
      handleAction('open-family', { dataset: {} });
    };
  } catch (e) { console.warn('Notif failed:', e); }
}

function getLastNotifiedTimestamp() {
  try { const v = localStorage.getItem(NOTIF_LAST_SEEN_KEY); return v ? parseInt(v, 10) || 0 : 0; }
  catch (e) { return 0; }
}
function setLastNotifiedTimestamp(ts) {
  try { localStorage.setItem(NOTIF_LAST_SEEN_KEY, String(ts)); } catch (e) {}
}

function fireNotificationsForNewMessages() {
  if (!notifUserEnabled() || !state.messages || state.messages.length === 0) return;
  const lastNotified = getLastNotifiedTimestamp();
  const fresh = state.messages.filter(m => (m.timestamp || 0) > lastNotified);
  if (fresh.length === 0) return;
  fresh.forEach(fireMessageNotif);
  const maxTs = Math.max(...state.messages.map(m => m.timestamp || 0));
  setLastNotifiedTimestamp(maxTs);
}

const DM_NOTIF_LAST_KEY = 'chef:dmnotif:lastseen:v1';
function getDmNotifLast() {
  try { return parseInt(localStorage.getItem(DM_NOTIF_LAST_KEY) || '0', 10) || 0; }
  catch (e) { return 0; }
}
function setDmNotifLast(ts) {
  try { localStorage.setItem(DM_NOTIF_LAST_KEY, String(ts)); } catch (e) {}
}
function fireDmNotif(msg) {
  if (!notifUserEnabled()) return;
  if (!state.profile || msg.fromId === getMyMemberId()) return;
  // Ne pas notifier si on est en train de regarder cette conversation
  const inThisDm = state.modal && state.modal.type === 'family-chat' &&
    state.familySubview === 'dm' && state.activeDmId === msg.fromId &&
    document.visibilityState === 'visible';
  if (inThisDm) return;
  try {
    const body = (msg.content || '').replace(/\*\*/g, '').slice(0, 140);
    const n = new Notification((msg.fromName || 'Membre') + ' (privé) — Mise en place', {
      body, tag: 'mep-dm-' + msg.id, renotify: false, silent: false,
    });
    n.onclick = () => {
      try { window.focus(); } catch (e) {}
      n.close();
      handleAction('open-dm', { dataset: { id: msg.fromId } });
    };
  } catch (e) {}
}
function fireDmNotifsForNewMessages() {
  if (!notifUserEnabled()) return;
  const last = getDmNotifLast();
  let maxTs = last;
  for (const arr of Object.values(state.dms || {})) {
    for (const m of (arr || [])) {
      if ((m.timestamp || 0) > last && m.fromId && m.fromId !== getMyMemberId()) {
        fireDmNotif(m);
      }
      if ((m.timestamp || 0) > maxTs) maxTs = m.timestamp;
    }
  }
  if (maxTs > last) setDmNotifLast(maxTs);
}

const BASE_TITLE = 'Mise en Place — Chef à domicile';
function updateTitleBadge() {
  const dmTotal = Object.values(state.unreadDms || {}).reduce((s, n) => s + n, 0);
  const total = (state.unreadCount || 0) + dmTotal;
  document.title = total > 0
    ? `(${total}) ${BASE_TITLE}`
    : BASE_TITLE;
}

let visibilityListenerInstalled = false;
function installVisibilityListener() {
  if (visibilityListenerInstalled) return;
  visibilityListenerInstalled = true;
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState !== 'visible') return;
    if (state.locked) return;
    try {
      await loadMessages();
      fireNotificationsForNewMessages();
      updateTitleBadge();
      render();
    } catch (e) {}
  });
}

// Poll périodique Firebase → permet de voir les messages + modifs des autres
// devices de la famille. Intervalles adaptatifs :
//   - chat famille ouvert    : 5 s  (réactivité conversation)
//   - app au premier plan    : 20 s (compromis entre fraîcheur et bande passante)
//   - app en arrière-plan    : 60 s (économie batterie)
let pollIntervalHandle = null;
let pollLastTickAt = 0;

function startBackgroundPolling() {
  if (pollIntervalHandle) return;
  pollIntervalHandle = setInterval(async () => {
    if (state.locked) return;
    const familyOpen = state.modal && state.modal.type === 'family-chat';
    const chatOpen = familyOpen && (state.familySubview === 'messages' || state.familySubview === 'dm');
    const visible = document.visibilityState === 'visible';
    const minInterval = chatOpen ? 5000 : (visible ? 20000 : 60000);
    if (Date.now() - pollLastTickAt < minInterval) return;
    pollLastTickAt = Date.now();
    try {
      // Re-test Firebase si on était offline
      if (!firebaseReachable) {
        await testFirebase();
        if (!firebaseReachable) return;
      }
      const beforeMsgCount = state.messages.length;
      const beforeMembersJson = JSON.stringify(state.members.map(mm => [mm.id, mm.lastSeenAt]));
      const beforeDmsJson = JSON.stringify(Object.entries(state.dms).map(([k, v]) => [k, (v || []).length]));
      await loadMessages();
      // Rafraîchit aussi les membres (présence) et les DM
      try { await loadMembers(); } catch (e) {}
      try { await loadAllDms(); } catch (e) {}
      // Pour la vue DM ouverte, recharge le thread spécifique
      if (state.familySubview === 'dm' && state.activeDmId) {
        try { await loadDmThread(state.activeDmId); } catch (e) {}
      }
      const dmsChanged = JSON.stringify(Object.entries(state.dms).map(([k, v]) => [k, (v || []).length])) !== beforeDmsJson;
      const membersChanged = JSON.stringify(state.members.map(mm => [mm.id, mm.lastSeenAt])) !== beforeMembersJson;
      // Si on a vu de nouveaux messages, déclenche notifs + re-render
      if (state.messages.length !== beforeMsgCount) {
        fireNotificationsForNewMessages();
        updateTitleBadge();
        render();
        // Auto-scroll si chat ouvert
        if (chatOpen) setTimeout(() => {
          const el = document.getElementById('fam-chat-messages') || document.getElementById('fam-dm-messages');
          if (el) el.scrollTop = el.scrollHeight;
        }, 50);
      } else if (dmsChanged || membersChanged) {
        // DM ou présence changé : notifs DM + re-render
        if (dmsChanged) fireDmNotifsForNewMessages();
        updateTitleBadge();
        render();
        if (state.familySubview === 'dm') setTimeout(() => {
          const el = document.getElementById('fam-dm-messages');
          if (el) el.scrollTop = el.scrollHeight;
        }, 50);
      } else {
        // Rafraîchit aussi les données partagées (menus/stock/tickets modifiés ailleurs)
        // seulement si l'utilisateur n'est PAS en train d'éditer un formulaire
        const editingModal = state.modal && ['dish-form', 'stock-add', 'shop-add', 'event-form', 'receipt-form', 'settings', 'profile-setup', 'pin-form', 'invite'].includes(state.modal.type);
        if (!editingModal) {
          const beforeData = JSON.stringify(state.data);
          await loadData();
          if (JSON.stringify(state.data) !== beforeData) render();
        }
      }
    } catch (e) { /* silencieux, on retentera au prochain tick */ }
  }, 1000); // tick chaque seconde, mais le minInterval gate la fréquence réelle
}

// Date helpers
function fmtDate(d) {
  // Utilise les composants LOCAUX (pas UTC) — fixe l'off-by-one en CET/CEST (Belgique)
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function getWeekStart(offset = 0) {
  const d = new Date();
  d.setHours(0,0,0,0);
  const day = d.getDay() === 0 ? 7 : d.getDay();
  d.setDate(d.getDate() - day + 1 + (offset * 7));
  return d;
}
function getWeekKey(offset = 0) { return fmtDate(getWeekStart(offset)); }
function fmtDay(d) { return d.toLocaleDateString('fr-FR', { weekday: 'long' }); }
function fmtDateShort(d) { return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }); }
function fmtMoney(n) { return (n || 0).toFixed(2).replace('.', ',') + ' €'; }
function uid() { return Math.random().toString(36).slice(2, 10); }

// ============================================================
// IMAGE UTILS (camera capture + compression)
// ============================================================
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('Lecture image impossible'));
    r.readAsDataURL(file);
  });
}

async function compressImage(dataUrl, maxDim = 1600, quality = 0.72) {
  const img = new Image();
  await new Promise((res, rej) => {
    img.onload = res;
    img.onerror = () => rej(new Error('Image invalide'));
    img.src = dataUrl;
  });
  let w = img.naturalWidth, h = img.naturalHeight;
  if (!w || !h) throw new Error('Image vide');
  const ratio = Math.min(1, maxDim / Math.max(w, h));
  w = Math.round(w * ratio);
  h = Math.round(h * ratio);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w, h);
  ctx.drawImage(img, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', quality);
}

function approxKB(dataUrl) {
  return Math.round((dataUrl.length * 3 / 4) / 1024);
}

function preserveReceiptFormDraft() {
  if (!state.modal || state.modal.type !== 'receipt-form') return;
  const date = document.getElementById('rec-date');
  const total = document.getElementById('rec-total');
  const sup = document.getElementById('rec-sup');
  const notes = document.getElementById('rec-notes');
  if (!state.modal.receipt) state.modal.receipt = { date: fmtDate(new Date()), supplier: 'Supermarché', total: '', notes: '' };
  if (date && date.value) state.modal.receipt.date = date.value;
  if (total) state.modal.receipt.total = total.value;
  if (sup) state.modal.receipt.supplier = sup.value;
  if (notes) state.modal.receipt.notes = notes.value;
}

async function processReceiptImage(file) {
  preserveReceiptFormDraft();
  state.scanning = true;
  render();
  try {
    const rawUrl = await readFileAsDataURL(file);
    const compressed = await compressImage(rawUrl, 1600, 0.72);
    state.draftReceiptImage = compressed;

    if (aiAvailable()) {
      const ocr = await ocrReceipt(compressed);
      if (ocr && state.modal && state.modal.type === 'receipt-form') {
        if (!state.modal.receipt) state.modal.receipt = {};
        const cur = state.modal.receipt;
        if (ocr.date && !cur.date) cur.date = ocr.date;
        if (ocr.supplier && (!cur.supplier || cur.supplier === 'Supermarché')) cur.supplier = ocr.supplier;
        if (ocr.total != null && !cur.total) cur.total = ocr.total;
        if (ocr.notes && !cur.notes) cur.notes = ocr.notes;
        showToast('Ticket lu — vérifie les infos');
      } else if (!ocr) {
        showToast('Image OK — saisie manuelle');
      }
    } else {
      showToast('Image ajoutée (' + approxKB(compressed) + ' KB)');
    }
  } catch (e) {
    console.error('Receipt image error:', e);
    showToast('Erreur image : ' + (e.message || 'inconnue'));
  } finally {
    state.scanning = false;
    render();
  }
}

// ============================================================
// VIEW RENDERERS
// ============================================================
function getWeekData(offset = 0) {
  const key = getWeekKey(offset);
  if (!state.data.weeks[key]) {
    state.data.weeks[key] = { days: {} };
    for (let i = 0; i < 7; i++) {
      const d = new Date(getWeekStart(offset));
      d.setDate(d.getDate() + i);
      state.data.weeks[key].days[fmtDate(d)] = {
        couverts: state.data.settings.defaultCouverts,
        services: { dejeuner: '', midi: '', gouter: '', soir: '' },
        notes: '',
      };
    }
  }
  return state.data.weeks[key];
}
function findDish(name) {
  if (!name) return null;
  return state.data.menuBank.find(d => d.name === name);
}
function getServiceCost(dishName, couverts) {
  const dish = findDish(dishName);
  if (!dish) return 0;
  return dish.costPerPerson * couverts;
}
function getDayTotal(dayData) {
  const c = dayData.couverts;
  return ['dejeuner', 'midi', 'gouter', 'soir'].reduce((sum, s) => sum + getServiceCost(dayData.services[s], c), 0);
}
function getWeekTotal(offset = 0) {
  const wk = getWeekData(offset);
  return Object.values(wk.days).reduce((sum, d) => sum + getDayTotal(d), 0);
}

// Receipt helpers
function getReceiptsForRange(startDate, endDate) {
  const start = fmtDate(startDate);
  const end = fmtDate(endDate);
  return (state.data.receipts || []).filter(r => r.date >= start && r.date <= end);
}
function getReceiptsForWeek(offset = 0) {
  const start = getWeekStart(offset);
  const end = new Date(start); end.setDate(end.getDate() + 6);
  return getReceiptsForRange(start, end);
}
function getReceiptsForMonth(offset = 0) {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth() + offset, 1);
  const end = new Date(now.getFullYear(), now.getMonth() + offset + 1, 0);
  return getReceiptsForRange(start, end);
}
function getMonthRange(offset = 0) {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth() + offset, 1);
  const end = new Date(now.getFullYear(), now.getMonth() + offset + 1, 0);
  return { start, end };
}
function monthLabel(d) {
  return d.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
}
function daysInMonth(year, monthIdx) {
  return new Date(year, monthIdx + 1, 0).getDate();
}
function sumReceipts(list) {
  return list.reduce((s, r) => s + (parseFloat(r.total) || 0), 0);
}

// Event helpers
const EVENT_TYPES = {
  birthday: { icon: '🎂', label: 'Anniversaire' },
  guests:   { icon: '👥', label: 'Invités' },
  absence:  { icon: '✈️', label: 'Absence' },
  party:    { icon: '🎉', label: 'Occasion' },
  appointment: { icon: '🏥', label: 'Rendez-vous' },
  other:    { icon: '📅', label: 'Autre' },
};

function getEventsForDate(dateStr) {
  return (state.data.events || []).filter(e => {
    if (e.endDate) return dateStr >= e.date && dateStr <= e.endDate;
    return e.date === dateStr;
  });
}
function getUpcomingEvents(daysAhead = 14) {
  const today = fmtDate(new Date());
  const limit = new Date(); limit.setDate(limit.getDate() + daysAhead);
  const limitStr = fmtDate(limit);
  return (state.data.events || [])
    .filter(e => {
      const endRef = e.endDate || e.date;
      return endRef >= today;
    })
    .filter(e => e.date <= limitStr)
    .sort((a, b) => a.date.localeCompare(b.date));
}
function getAllEvents() {
  return (state.data.events || []).slice().sort((a, b) => b.date.localeCompare(a.date));
}

// --- TODAY VIEW ---
function renderToday() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayKey = fmtDate(today);
  const wk = getWeekData(0);
  const dayData = wk.days[todayKey] || { couverts: state.data.settings.defaultCouverts, services: { dejeuner: '', midi: '', gouter: '', soir: '' } };

  const weekTotal = getWeekTotal(0);
  const weekReal = sumReceipts(getReceiptsForWeek(0));
  const budget = state.data.settings.budgetWeekly;
  const pct = Math.min(100, (weekReal / budget) * 100);
  const remaining = budget - weekReal;

  const services = [
    { key: 'dejeuner', label: 'Déjeuner', sub: 'Matin' },
    { key: 'midi', label: 'Midi', sub: 'Repas du midi' },
    { key: 'gouter', label: 'Goûter', sub: 'Après-midi' },
    { key: 'soir', label: 'Soir', sub: 'Repas du soir' },
  ];

  const dateStr = today.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

  // Alerts (inventory below threshold)
  const alerts = state.data.inventory.filter(i => i.qty <= i.threshold);

  // Upcoming events (next 7 days)
  const upcomingEvents = getUpcomingEvents(7);

  return `
    <div class="page-sub">${dateStr}</div>
    <h1 class="page-title">Bonjour, <em>chef</em>.</h1>

    <div class="budget-card" style="margin-top: 20px;">
      <div class="budget-label">Dépensé cette semaine</div>
      <div style="display: flex; align-items: flex-end; justify-content: space-between; gap: 10px;">
        <div class="budget-amount num">${fmtMoney(weekReal).replace(' €','')}<span class="small"> / ${fmtMoney(budget)}</span></div>
      </div>
      <div class="budget-bar"><div class="budget-bar-fill" style="width: ${pct}%"></div></div>
      <div class="budget-meta">
        <span>${pct.toFixed(0)}% utilisé · Prévu ${fmtMoney(weekTotal)}</span>
        <span>Reste ${fmtMoney(remaining)}</span>
      </div>
    </div>

    <div class="section-title">Services du jour <span style="text-transform:none;letter-spacing:0;font-weight:500;color:var(--muted-2);">· ${dayData.couverts} couverts</span></div>
    <div class="service-grid">
      ${services.map(s => {
        const dish = dayData.services[s.key];
        const cost = getServiceCost(dish, dayData.couverts);
        return `
          <div class="service-card ${s.key}" data-action="edit-service" data-service="${s.key}" data-date="${todayKey}">
            <div>
              <div class="service-name">${s.label}</div>
              <div class="dish ${dish ? '' : 'empty'}">${dish || 'Non défini'}</div>
            </div>
            <div class="cost">${dish ? fmtMoney(cost) : '— —'}</div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="section-title">Assistant IA</div>
    <div class="ai-card" data-action="ai-stock-meal">
      <div class="ai-icon">${ICONS.sparkles}</div>
      <div class="ai-text">
        <div class="ai-title">Que cuisiner avec mon stock ?</div>
        <div class="ai-sub">Suggestion à partir de l'inventaire actuel</div>
      </div>
    </div>

    ${upcomingEvents.length > 0 ? `
      <div class="section-title">À venir cette semaine</div>
      ${upcomingEvents.map(e => renderEventCard(e)).join('')}
    ` : ''}

    ${alerts.length > 0 ? `
      <div class="section-title">Alertes stock</div>
      ${alerts.slice(0, 5).map(i => `
        <div class="stock-item alert">
          <div class="stock-name">${i.name}</div>
          <div class="stock-alert-badge">À racheter</div>
          <div style="font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums;">${i.qty} ${i.unit}</div>
        </div>
      `).join('')}
    ` : ''}
  `;
}

// --- WEEK VIEW ---
function renderWeek() {
  const offset = state.weekOffset;
  const wk = getWeekData(offset);
  const start = getWeekStart(offset);
  const total = getWeekTotal(offset);
  const budget = state.data.settings.budgetWeekly;

  const today = new Date(); today.setHours(0,0,0,0);
  const todayKey = fmtDate(today);

  const weekLabel = offset === 0 ? 'Cette semaine' : offset === -1 ? 'Semaine dernière' : offset === 1 ? 'Semaine prochaine' : `Semaine ${offset > 0 ? '+' : ''}${offset}`;

  const services = [
    { key: 'dejeuner', label: 'DÉJ' },
    { key: 'midi', label: 'MIDI' },
    { key: 'gouter', label: 'GTR' },
    { key: 'soir', label: 'SOIR' },
  ];

  return `
    <div class="page-sub">Planificateur</div>
    <h1 class="page-title">La <em>semaine</em>.</h1>

    <div class="week-nav" style="margin-top: 20px;">
      <button class="icon-btn" data-action="week-prev">${ICONS.chevronL}</button>
      <div class="week-label">
        <span class="week-num">${weekLabel}</span>
        Du ${start.getDate()} au ${(() => { const e = new Date(start); e.setDate(e.getDate()+6); return e.getDate() + ' ' + e.toLocaleDateString('fr-FR', {month: 'long'}); })()}
      </div>
      <button class="icon-btn" data-action="week-next">${ICONS.chevronR}</button>
    </div>

    <div class="ai-card" data-action="ai-generate-week" style="margin-bottom: 14px;">
      <div class="ai-icon">${ICONS.sparkles}</div>
      <div class="ai-text">
        <div class="ai-title">Génère-moi cette semaine</div>
        <div class="ai-sub">Menus complets, équilibrés, budget respecté</div>
      </div>
    </div>

    ${Object.entries(wk.days).map(([dateKey, dayData]) => {
      const d = new Date(dateKey);
      const isToday = dateKey === todayKey;
      const dayTotal = getDayTotal(dayData);
      const dayEvents = getEventsForDate(dateKey);
      return `
        <div class="day-card">
          <div class="day-header ${isToday ? 'today' : ''}">
            <div class="day-name">${fmtDay(d)}<span class="day-date">${fmtDateShort(d)}${isToday ? ' · AUJ.' : ''}</span></div>
            <div style="display:flex;align-items:center;gap:8px;">
              ${dayEvents.length > 0 ? `<div style="display:flex;gap:2px;">${dayEvents.slice(0, 3).map(e => `<span style="font-size:14px;" title="${escapeHtml(e.title)}">${EVENT_TYPES[e.type]?.icon || '📅'}</span>`).join('')}</div>` : ''}
              <div class="day-total num">${fmtMoney(dayTotal)}</div>
            </div>
          </div>
          ${dayEvents.length > 0 ? `
            <div style="padding:8px 14px;background:rgba(212,150,69,.08);border-bottom:1px solid var(--border);font-size:12px;color:var(--ink-2);">
              ${dayEvents.map(e => `<div style="display:flex;align-items:center;gap:6px;${dayEvents.length > 1 ? 'margin-bottom:2px;' : ''}"><strong style="font-weight:600;">${EVENT_TYPES[e.type]?.icon || '📅'} ${escapeHtml(e.title)}</strong>${e.affectsMeal && e.mealNote ? ` <span style="color:var(--muted);">— ${escapeHtml(e.mealNote.slice(0,50))}${e.mealNote.length > 50 ? '…' : ''}</span>` : ''}</div>`).join('')}
            </div>
          ` : ''}
          <div class="day-services">
            ${services.map(s => {
              const dish = dayData.services[s.key];
              const cost = getServiceCost(dish, dayData.couverts);
              return `
                <div class="day-service-row" data-action="edit-service" data-service="${s.key}" data-date="${dateKey}">
                  <div class="service-badge ${s.key}">${s.label}</div>
                  <div class="day-service-dish ${dish ? '' : 'empty'}">${dish || 'Ajouter un plat'}</div>
                  <div class="day-service-cost num">${dish ? fmtMoney(cost) : ''}</div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }).join('')}

    <div class="budget-card" style="margin-top: 18px;">
      <div class="budget-label">Total semaine</div>
      <div class="budget-amount num">${fmtMoney(total).replace(' €','')}<span class="small"> / ${fmtMoney(budget)}</span></div>
      <div class="budget-bar"><div class="budget-bar-fill" style="width: ${Math.min(100, (total/budget)*100)}%"></div></div>
    </div>
  `;
}

// --- CARTE (Menu Bank) ---
function renderCarte() {
  const categories = ['Tous', ...new Set(state.data.menuBank.map(d => d.category))];
  let filtered = state.data.menuBank;
  if (state.filterCategory !== 'Tous') filtered = filtered.filter(d => d.category === state.filterCategory);
  if (state.searchTerm) {
    const t = state.searchTerm.toLowerCase();
    filtered = filtered.filter(d => d.name.toLowerCase().includes(t) || (d.ingredients || '').toLowerCase().includes(t));
  }

  return `
    <div class="page-sub">${state.data.menuBank.length} plats en banque</div>
    <h1 class="page-title">La <em>carte</em>.</h1>

    <div style="margin-top: 18px; margin-bottom: 12px;">
      <input class="search-input" placeholder="Chercher un plat, un ingrédient..." value="${state.searchTerm}" data-input="search">
    </div>

    <div class="filter-bar">
      ${categories.map(c => `<button class="chip ${state.filterCategory === c ? 'active' : ''}" data-action="filter" data-cat="${c}">${c}</button>`).join('')}
    </div>

    <button class="btn btn-secondary btn-full" data-action="ai-create-dish" style="margin-bottom: 10px;">
      ${ICONS.sparkles}
      Créer un nouveau plat avec l'IA
    </button>
    <button class="btn btn-ghost btn-full" data-action="add-dish" style="margin-bottom: 16px;">
      ${ICONS.plus}
      Ajouter manuellement
    </button>

    ${filtered.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">🍽️</div>
        <div class="empty-title">Aucun plat trouvé</div>
        <div>Essaie une autre recherche ou ajoute-en un</div>
      </div>
    ` : filtered.map(dish => `
      <div class="dish-item" data-action="edit-dish" data-id="${dish.id}">
        <div class="dish-info">
          <div class="dish-name">${dish.name}</div>
          <div class="dish-meta">
            <span class="dish-tag">${dish.category}</span>
            <span>${dish.prepTime} min</span>
            <span>★ ${dish.rating}/5</span>

        </div>
        <div class="dish-cost">
          <div class="dish-cost-value num">${fmtMoney(dish.costPerPerson).replace(' €','')}€</div>

      <button class="${state.coursesSubview === 'shopping' ? 'subtab active' : 'subtab'}" data-action="courses-sub" data-sub="shopping" style="flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;${state.coursesSubview === 'shopping' ? 'background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);' : 'background:transparent;color:var(--muted);'}">
        À acheter
      </button>
      <button class="${state.coursesSubview === 'tickets' ? 'subtab active' : 'subtab'}" data-action="courses-sub" data-sub="tickets" style="flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;${state.coursesSubview === 'tickets' ? 'background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);' : 'background:transparent;color:var(--muted);'}">

    ${state.coursesSubview === 'shopping' ? renderShopping() : renderTickets()}
