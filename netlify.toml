# Configuration de déploiement Netlify
# Page d'accueil : Cockpit (index.html). L'ancienne app de repas reste sur /repas.html.
# Fichiers statiques à la racine, aucun build nécessaire.

[build]
  publish = "."

# SPA : toute route renvoie vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
